<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dino Run</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        html {
            height: 100%;
            overscroll-behavior-y: contain; /* Extra guard against Chrome/Android pull-to-refresh */
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #f7f7f7;
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
            overscroll-behavior-y: contain;
            -webkit-user-select: none;
            user-select: none;           /* No accidental text selection while swiping */
            -webkit-touch-callout: none;  /* No iOS long-press callout menu on the game surface */
            margin: 0;
            overflow: hidden;
        }

        /* =========================================================================
           FULL-PAGE VIEWPORT LAYOUT (UI/Layout Refactor)
           ---------------------------------------------------------------------
           #game-container used to be an in-flow, centered box capped at
           `max-w-3xl`, which left large unused margins on anything wider than
           a small tablet. It's now pinned to the full browser viewport with
           `position: fixed; inset: 0`, so it always occupies exactly
           100vw x 100vh (100dvh is used as the primary value so iOS/Android's
           collapsing/expanding browser chrome never clips or letterboxes the
           game incorrectly -- 100vh is kept as a fallback for browsers that
           don't support dvh yet). The title (<h1>) now lives *inside* this
           container as an absolutely-positioned HUD element instead of a
           separate block above it, so it no longer steals vertical space that
           should belong to the canvas -- see fitCanvasToViewport() in the
           script, which now fits against the *entire* viewport with only a
           small safe-area pad, not "viewport minus title chrome".
           ------------------------------------------------------------------- */
        #game-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* dynamic viewport height -- accounts for mobile browser chrome */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            image-rendering: pixelated;
            /* Deliberately left at the default touch-action ('auto') rather than
               'none' -- #shop-panel (a scrollable descendant, see below) needs to
               inherit permission to pan. touch-action is applied as the
               INTERSECTION of an element and all its ancestors, so locking this
               down here would also lock the shop's scroll list. Instead, only
               the actual play surface (#gameCanvas / #overlay, below) is locked. */
        }

        /* ---------------------------------------------------------------------
           RESPONSIVE VIEWPORT SCALING (see fitCanvasToViewport() in the script)
           -----------------------------------------------------------------------
           The canvas's internal drawing resolution never changes -- only its
           CSS box does. `max-width:100%` is just a pre-JS safety net; the real
           sizing happens every load/resize/orientation-change in JS, which is
           more reliable than pure CSS across iOS Safari's dynamic toolbar,
           Android split-screen, and orientation changes. `image-rendering:
           pixelated` is what keeps the pixel-art crisp (nearest-neighbor)
           instead of blurry (bilinear) no matter how large the CSS box scales
           relative to the fixed 800x250 internal resolution.
           ------------------------------------------------------------------- */
        canvas {
            display: block;
            margin: 0 auto;
            background-color: transparent;
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* Safe-area aware HUD padding -- keeps the title/score/badges clear of
           notches, camera cutouts, and rounded corners on full-screen mobile
           devices, while degrading gracefully to a plain 1rem pad on desktop
           browsers/older devices that don't support env(). */
        #hud-title {
            top: max(0.75rem, env(safe-area-inset-top));
        }
        #powerup-bar {
            top: max(1rem, env(safe-area-inset-top));
            left: max(1rem, env(safe-area-inset-left));
        }
        #hud-score-bar {
            top: max(1rem, env(safe-area-inset-top));
            right: max(1rem, env(safe-area-inset-right));
        }

        #gameCanvas, #overlay {
            touch-action: none;          /* No native scroll/zoom/pull-to-refresh once a gesture starts on the play surface */
            -webkit-touch-callout: none;
        }

        /* Dark mode support (page chrome only -- the game canvas has its own
           independent day/night cycle driven by score, see JS below) */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #202124;
                color: #bdc1c6;
            }
        }

        /* --- Power-up status badges (top-left HUD) --- */
        .powerup-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(128, 128, 128, 0.12);
            border: 1px solid currentColor;
            border-radius: 4px;
            padding: 4px 6px 5px 6px;
            font-size: 10px;
            position: relative;
            overflow: hidden;
        }
        .powerup-badge .badge-icon {
            font-size: 12px;
            line-height: 1;
        }
        .powerup-badge .badge-time {
            font-size: 9px;
            min-width: 14px;
        }
        .powerup-badge .badge-track {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 2px;
            background: rgba(128, 128, 128, 0.3);
        }
        .powerup-badge .badge-fill {
            height: 100%;
            width: 100%;
            background: currentColor;
        }
    </style>
</head>
<body class="overflow-hidden transition-colors duration-300">

    <!-- Main Game Area -- now pinned to the full browser viewport (see
         #game-container in <style>) instead of a centered, width-capped box,
         so there's no more wasted whitespace on desktop/large screens. -->
    <div id="game-container" class="relative">

        <!-- Title -- moved from a separate in-flow block above the game into
             an absolutely-positioned HUD element *inside* #game-container.
             This is what frees up the vertical space it used to occupy, so
             fitCanvasToViewport() can size the canvas against the full
             viewport height instead of "viewport minus title block". -->
        <h1 id="hud-title" class="absolute inset-x-0 text-center text-sm md:text-xl font-bold z-10 pointer-events-none opacity-80">T-REX RUN</h1>

        <!-- Power-up Status HUD (top-left, anchored to the viewport corner) -->
        <div id="powerup-bar" class="absolute flex gap-2 z-10 text-gray-600 dark:text-gray-400">
            <div id="badge-shield" class="powerup-badge hidden">
                <span class="badge-icon">🛡️</span><span class="badge-time">0s</span>
                <div class="badge-track"><div class="badge-fill"></div></div>
            </div>
            <div id="badge-doubleJump" class="powerup-badge hidden">
                <span class="badge-icon">⏫</span><span class="badge-time">0s</span>
                <div class="badge-track"><div class="badge-fill"></div></div>
            </div>
            <div id="badge-magnet" class="powerup-badge hidden">
                <span class="badge-icon">🧲</span><span class="badge-time">0s</span>
                <div class="badge-track"><div class="badge-fill"></div></div>
            </div>
        </div>

        <!-- Score Display (top-right, anchored to the viewport corner) -->
        <div id="hud-score-bar" class="absolute flex items-center gap-2 md:gap-5 text-sm md:text-base text-gray-600 dark:text-gray-400 z-10">
            <button id="mute-btn" class="text-sm md:text-base leading-none hover:opacity-70 transition-opacity" title="Toggle sound" aria-label="Toggle sound">🔊</button>
            <div id="coin-total" class="text-[9px] md:text-xs text-yellow-600 dark:text-yellow-400 whitespace-nowrap">🪙 0</div>
            <div class="whitespace-nowrap">HI <span id="high-score">00000</span></div>
            <div id="current-score">00000</div>
        </div>

        <!-- Start / Game Over Overlay -->
        <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 cursor-pointer">
            <div id="game-over-text" class="hidden text-xl md:text-2xl text-gray-700 dark:text-gray-200 mb-6">GAME OVER</div>
            <button id="start-btn" class="px-4 py-2 border-2 border-gray-400 dark:border-gray-500 rounded text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                Tap to Play
            </button>
            <button id="shop-btn" class="mt-3 px-3 py-1.5 border-2 border-yellow-400 dark:border-yellow-500 rounded text-[10px] md:text-xs text-yellow-600 dark:text-yellow-400 hover:bg-yellow-100 dark:hover:bg-yellow-900/30 transition-colors">
                🛒 Shop
            </button>
        </div>

        <!-- Shop Overlay (skin unlocks, spends persisted coins) -->
        <div id="shop-overlay" class="absolute inset-0 z-30 hidden flex items-center justify-center bg-black/70 p-4">
            <div id="shop-panel" class="bg-white dark:bg-gray-900 border-2 border-gray-400 dark:border-gray-600 rounded-lg p-4 md:p-5 max-w-sm w-full max-h-[92%] overflow-y-auto text-gray-700 dark:text-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs md:text-sm">🛒 SKIN SHOP</h2>
                    <div id="shop-coin-display" class="text-[10px] md:text-xs text-yellow-600 dark:text-yellow-400">🪙 0</div>
                </div>
                <div id="shop-grid" class="grid grid-cols-2 gap-3"></div>
                <button id="shop-close-btn" class="mt-4 w-full px-4 py-2 border-2 border-gray-400 dark:border-gray-500 rounded text-[10px] md:text-xs hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    Close
                </button>
            </div>
        </div>

        <!-- The Canvas -->
        <canvas id="gameCanvas" width="800" height="250" class="mx-auto max-w-full"></canvas>
    </div>

    <script>
        /* =========================================================================
         * T-REX RUN -- upgraded arcade edition
         * ---------------------------------------------------------------------
         * New in this version:
         *   - Smooth day/night cycle (colors transition continuously, one full
         *     cycle every 1000 points -- full night at 500, full day at 1000...)
         *   - Dust trail behind the running dino + explosion/sparkle particles
         *   - Camera screenshake on hard landings and on game over
         *   - Power-ups: Shield (invincibility), Double Jump, Coin Magnet
         *   - Collectible coins & rare "dino eggs" at varying heights
         * The file is organized top-to-bottom as:
         *   CONFIG -> THEME/COLOR SYSTEM -> PARTICLE SYSTEM -> ENTITIES ->
         *   CORE GAME FUNCTIONS -> MAIN LOOP -> INPUT HANDLING
         * ========================================================================= */

        const gameContainer = document.getElementById('game-container');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const gameOverText = document.getElementById('game-over-text');
        const scoreElement = document.getElementById('current-score');
        const highScoreElement = document.getElementById('high-score');

        // -- New UI elements: meta-game (shop, currency, audio toggle) --
        const muteBtn = document.getElementById('mute-btn');
        const coinTotalElement = document.getElementById('coin-total');
        const shopBtn = document.getElementById('shop-btn');
        const shopOverlay = document.getElementById('shop-overlay');
        const shopGrid = document.getElementById('shop-grid');
        const shopCoinDisplay = document.getElementById('shop-coin-display');
        const shopCloseBtn = document.getElementById('shop-close-btn');

        /* =========================================================================
         * CONFIGURATION
         * ========================================================================= */
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 250;
        const GROUND_Y = 210;
        const GRAVITY = 0.6;
        const JUMP_FORCE = -11;
        const INITIAL_SPEED = 6;
        const MAX_SPEED = 15;

        // A full day->night->day cycle spans this many score points. The color
        // blend is continuous, so the sky is fully "day" at score 0 & 1000,
        // fully "night" at score 500, 1500, etc -- transitioning smoothly between.
        const CYCLE_LENGTH = 1000;

        // Power-up durations, in milliseconds (converted to frames at ~60fps below)
        const SHIELD_DURATION_MS = 7000;      // Shield: 7s invincibility
        const DOUBLE_JUMP_DURATION_MS = 5000;  // Double Jump: 5s extra mid-air jump
        const MAGNET_DURATION_MS = 8000;       // Coin Magnet: 8s auto-collect radius
        const MAGNET_RADIUS = 160;             // px radius coins get pulled in from

        // Falling speed (vy) beyond which a landing counts as "hard" and shakes the camera
        const HARD_LANDING_VY = 9;

        const DURATION_FRAMES = {
            shield: Math.round(SHIELD_DURATION_MS / 1000 * 60),
            doubleJump: Math.round(DOUBLE_JUMP_DURATION_MS / 1000 * 60),
            magnet: Math.round(MAGNET_DURATION_MS / 1000 * 60)
        };

        const POWERUP_COLORS = { shield: '#4fd1ff', doubleJump: '#b98bff', magnet: '#ff8a5c' };
        const POWERUP_TYPES = ['shield', 'doubleJump', 'magnet'];

        /* =========================================================================
         * BOSS PHASE CONFIGURATION
         * ---------------------------------------------------------------------
         * Every 500 points the game suspends normal obstacle/collectible/power-up
         * spawning and throws a 30-second "survival" encounter against a giant
         * scaled-up Pterodactyl instead. See the BOSS PHASE STATE MACHINE section
         * in CORE GAME FUNCTIONS (triggerBossPhase / updateAndDrawBoss /
         * endBossSurvival) for the logic that drives all of this.
         * ========================================================================= */
        const BOSS_PHASE_DURATION_FRAMES = 1800; // 30s survival window at ~60fps
        const BOSS_REWARD_COINS = 100;           // paid out the instant the survival timer hits zero
        const BOSS_SCALE = 4;                    // how many times bigger than a normal type===2 Obstacle bird
        const BOSS_W = 42 * BOSS_SCALE;          // matches Obstacle type 2's base 42x32 art, scaled up
        const BOSS_H = 32 * BOSS_SCALE;
        const BOSS_COLOR = '#c81e1e';            // fixed "danger red" -- deliberately independent of the day/night theme
        const FIREBALL_SPEED = 9;                // px/frame, faster than any obstacle so it reads as a projectile
        const FIREBALL_MIN_INTERVAL = 45;        // frames between fireball spawns (lower bound)
        const FIREBALL_MAX_INTERVAL = 30;        // additional random frames added on top of the min
        const FIREBALL_JUMP_Y = GROUND_Y - 18;   // ground-hugging fireball -- only a jump clears it
        const FIREBALL_DUCK_Y = GROUND_Y - 50;   // head-height fireball -- only a duck clears it

        /* =========================================================================
         * RESPONSIVE VIEWPORT SCALING
         * ---------------------------------------------------------------------
         * The game's internal simulation always runs at a fixed logical
         * resolution (CANVAS_WIDTH x CANVAS_HEIGHT = 800x250) -- every spawn
         * position, hitbox, and drawing call in this file is written in those
         * units, so the <canvas> bitmap itself never changes size. What we
         * resize instead is the canvas element's *CSS box*, so it fits
         * whatever screen/orientation the player has while `image-rendering:
         * pixelated` (see <style>) keeps the pixel art crisp instead of
         * blurry when it's scaled up or down.
         *
         * fitCanvasToViewport() runs on load, on every resize/orientation
         * change, and on visualViewport resize (which catches mobile browser
         * chrome showing/hiding -- e.g. iOS Safari's collapsing URL bar --
         * that a plain `window.resize` listener can miss). It measures the
         * real estate left after the title and a little breathing room, then
         * picks the largest box that (a) preserves the game's native 3.2:1
         * aspect ratio and (b) fits inside that space. The practical effect:
         * portrait phones scale by available width, landscape phones/tablets
         * scale by available height, and the canvas never stretches or
         * distorts in either case.
         * ========================================================================= */
        function fitCanvasToViewport() {
            const aspectRatio = CANVAS_WIDTH / CANVAS_HEIGHT;

            // Width & height budget: #game-container is now pinned to the full
            // browser viewport (`position: fixed; inset: 0`, see <style>), so
            // there's no separate "title chrome" to subtract anymore -- the
            // title lives inside the HUD overlay on top of the canvas instead
            // of a block above it. visualViewport is preferred over
            // window.innerWidth/Height because it shrinks correctly when
            // mobile browser chrome (e.g. iOS Safari's collapsing URL bar) or
            // an on-screen keyboard covers part of the screen; window.inner*
            // is the fallback for browsers without it.
            const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

            // A small uniform safe-area pad so the canvas edge never touches
            // the physical screen edge (matches the HUD's own safe-area pad).
            const SAFE_PAD = 12;
            const availableWidth = Math.max(160, viewportWidth - SAFE_PAD * 2);
            const availableHeight = Math.max(120, viewportHeight - SAFE_PAD * 2);

            // Fit-to-box: start from full available width, then clamp by height
            // if that would overflow -- whichever axis is the binding constraint
            // for this screen/orientation wins, and the other axis follows it
            // to preserve the game's native 3.2:1 aspect ratio exactly (no
            // stretch, no distortion -- `image-rendering: pixelated` in <style>
            // keeps the pixel art crisp at any scale). Portrait phones end up
            // width-bound (letterboxed top/bottom); landscape phones, tablets,
            // and desktop monitors end up height-bound (letterboxed left/right)
            // -- in both cases the canvas grows to fill the larger of the two
            // axes without ever stretching.
            let targetWidth = availableWidth;
            let targetHeight = targetWidth / aspectRatio;
            if (targetHeight > availableHeight) {
                targetHeight = availableHeight;
                targetWidth = targetHeight * aspectRatio;
            }

            canvas.style.width = Math.floor(targetWidth) + 'px';
            canvas.style.height = Math.floor(targetHeight) + 'px';
        }

        window.addEventListener('resize', fitCanvasToViewport);
        window.addEventListener('orientationchange', fitCanvasToViewport);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', fitCanvasToViewport);
        }

        /* =========================================================================
         * SKINS (unlockable Dino cosmetics, purchased with coins in the Shop)
         * ---------------------------------------------------------------------
         * `colors: null` means "use the live day/night theme color" (the default
         * look). Every other skin fixes its own body/accent/eye colors and gets
         * a small bit of extra flair drawn in drawSkinFlairBack()/Front() below.
         * ========================================================================= */
        const SKINS = [
            /* ---------------- TIER 1 -- Common / Starter Flex (0 - 800) ---------------- */
            { id: 'classic', name: 'Classic', cost: 0, colors: null },
            { id: 'cyber', name: 'Cyber Dino', cost: 150, colors: { body: '#00e5ff', accent: '#ff2bd6', eye: '#0a0a0a' }, glow: '#00e5ff' },
            { id: 'wizard', name: 'Wizard Dino', cost: 300, colors: { body: '#7c4dff', accent: '#ffd54a', eye: '#ffffff' }, glow: '#b98bff' },
            { id: 'lava', name: 'Lava Dino', cost: 450, colors: { body: '#3a2a2a', accent: '#ff6a00', eye: '#ffcf40' }, glow: '#ff6a00' },
            { id: 'ghost', name: 'Ghost Dino', cost: 600, colors: { body: '#cfe8ff', accent: '#8fd3ff', eye: '#2b3a55' }, glow: '#bfe3ff', alpha: 0.55 },
            { id: 'camo', name: 'Camo Dino', cost: 700, colors: { body: '#5b6b45', accent: '#3f4a2e', eye: '#1c1c1c' } },
            { id: 'retro', name: 'Retro Arcade', cost: 800, colors: { body: '#e8483c', accent: '#ffd23f', eye: '#111111' }, glow: '#ffd23f' },

            /* ---------------- TIER 2 -- Rare / Street Flex (1,200 - 4,000) ---------------- */
            { id: 'ninja', name: 'Ninja Dino', cost: 1200, colors: { body: '#1b1b1f', accent: '#e0263e', eye: '#ffffff' }, glow: '#e0263e' },
            { id: 'golden', name: 'Golden Dino', cost: 2000, colors: { body: '#e6b400', accent: '#fff2b0', eye: '#3a2a00' }, glow: '#ffd700' },
            { id: 'neonglitch', name: 'Neon Glitch', cost: 2800, colors: { body: '#0d0d12', accent: '#ff2bd6', eye: '#00e5ff' }, glow: '#00e5ff' },
            { id: 'mecha', name: 'Mecha Dino', cost: 3500, colors: { body: '#8a94a6', accent: '#2fd1ff', eye: '#ff3b3b' }, glow: '#2fd1ff' },
            { id: 'streetdrip', name: 'Street Drip', cost: 4000, colors: { body: '#7a2f8a', accent: '#ffd700', eye: '#111111' }, glow: '#ffd700' },

            /* ---------------- TIER 3 -- Epic / Elemental Flex (6,000 - 15,000) ---------------- */
            { id: 'icecrystal', name: 'Ice Crystal', cost: 6000, colors: { body: '#bfe9ff', accent: '#ffffff', eye: '#1c3a52' }, glow: '#8fd8ff', alpha: 0.95 },
            { id: 'thunder', name: 'Thunder Lord', cost: 8500, colors: { body: '#1c2340', accent: '#ffe66d', eye: '#ffe66d' }, glow: '#ffe66d' },
            { id: 'toxicslime', name: 'Toxic Slime', cost: 10500, colors: { body: '#5cb82a', accent: '#c6ff3d', eye: '#0e2b00' }, glow: '#c6ff3d' },
            { id: 'voidshadow', name: 'Void Shadow', cost: 13000, colors: { body: '#15101d', accent: '#8f2bff', eye: '#c99bff' }, glow: '#8f2bff' },
            { id: 'phoenixember', name: 'Phoenix Ember', cost: 15000, colors: { body: '#ff5b1f', accent: '#ffd23f', eye: '#7a1400' }, glow: '#ff8a3d' },

            /* ---------------- TIER 4 -- Legendary / Cosmic Flex (25,000 - 60,000) ---------------- */
            { id: 'angelic', name: 'Angelic Wings', cost: 25000, colors: { body: '#fffdf5', accent: '#ffe27a', eye: '#8a7a3a' }, glow: '#fff2b8' },
            { id: 'demonic', name: 'Demonic Hellfire', cost: 35000, colors: { body: '#2b0505', accent: '#ff2200', eye: '#ffcf40' }, glow: '#ff3300' },
            { id: 'holomatrix', name: 'Holographic Matrix', cost: 45000, colors: { body: '#0c0c14', accent: '#39ff9d', eye: '#ffffff' }, glow: '#39ff9d' },
            { id: 'quantumplasma', name: 'Quantum Plasma', cost: 60000, colors: { body: '#4a1fb8', accent: '#00e5ff', eye: '#e0d0ff' }, glow: '#8f5bff', alpha: 0.92 },

            /* ---------------- TIER 5 -- Mythic / God-Tier Flex (100,000 - 250,000+) ---------------- */
            { id: 'goldengod', name: 'Golden God', cost: 100000, colors: { body: '#ffd700', accent: '#fff6cf', eye: '#5a3d00' }, glow: '#ffe066' },
            { id: 'chronolord', name: 'Chrono Lord', cost: 150000, colors: { body: '#241b4a', accent: '#c9a24b', eye: '#ffdf8a' }, glow: '#8f7bff' },
            { id: 'infinitydino', name: 'Infinity Dino', cost: 200000, colors: { body: '#0a0a1a', accent: '#ff6ad5', eye: '#ffffff' }, glow: '#7a5cff' },
            { id: 'glitchking', name: 'The Glitch King', cost: 250000, colors: { body: '#111111', accent: '#ff0044', eye: '#00ffe0' }, glow: '#ff0044' }
        ];

        /* =========================================================================
         * SAVE SYSTEM (localStorage)
         * ---------------------------------------------------------------------
         * Persists high score, lifetime coin bank, unlocked/equipped skins, and
         * the mute preference across page refreshes. All writes go through
         * persistSave() so every feature stays in sync in one place.
         * ========================================================================= */
        const SAVE_KEY = 'dinoRunSaveV1';

        let saveData = {
            highScore: 0,
            coins: 0,
            unlockedSkins: ['classic'],
            equippedSkin: 'classic',
            muted: false
        };

        function loadSave() {
            try {
                const raw = localStorage.getItem(SAVE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    saveData = Object.assign({}, saveData, parsed);
                    // Defensive: 'classic' is always free & unlocked, even on old/corrupt saves
                    if (!Array.isArray(saveData.unlockedSkins) || !saveData.unlockedSkins.includes('classic')) {
                        saveData.unlockedSkins = Array.isArray(saveData.unlockedSkins) ? saveData.unlockedSkins : [];
                        saveData.unlockedSkins.push('classic');
                    }
                    if (!SKINS.find(s => s.id === saveData.equippedSkin)) saveData.equippedSkin = 'classic';
                }
            } catch (err) {
                console.warn('Dino Run: could not load saved data, starting fresh.', err);
            }
        }

        function persistSave() {
            try {
                localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
            } catch (err) {
                console.warn('Dino Run: could not persist save data.', err);
            }
        }

        function updateCoinDisplay() {
            coinTotalElement.textContent = '🪙 ' + saveData.coins;
        }

        function updateMuteButton() {
            muteBtn.textContent = saveData.muted ? '🔇' : '🔊';
        }

        /* =========================================================================
         * AUDIO -- retro 8-bit sound effects synthesized with the Web Audio API.
         * ---------------------------------------------------------------------
         * No external audio files: every sound is a short oscillator (square /
         * triangle / sawtooth wave) or a filtered noise burst with a quick
         * exponential volume envelope, which is what gives it that classic
         * "chiptune" character. The AudioContext is created lazily and resumed
         * on the player's first input, since browsers block audio autoplay
         * before a user gesture.
         * ========================================================================= */
        const Sound = (() => {
            let audioCtx = null;

            function ensureContext() {
                if (!audioCtx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) audioCtx = new AC();
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            // Plays one oscillator tone with an exponential decay envelope.
            // `slideTo` (optional) linearly bends the pitch over the note's duration.
            function tone(freq, duration, { type = 'square', volume = 0.15, slideTo = null, delay = 0 } = {}) {
                if (saveData.muted) return;
                const ac = ensureContext();
                if (!ac) return;
                const t0 = ac.currentTime + delay;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t0);
                if (slideTo !== null) osc.frequency.linearRampToValueAtTime(slideTo, t0 + duration);
                gain.gain.setValueAtTime(volume, t0);
                gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
                osc.connect(gain).connect(ac.destination);
                osc.start(t0);
                osc.stop(t0 + duration + 0.02);
            }

            // Short burst of decaying white noise -- used for the duck "thud"
            function noise(duration, { volume = 0.12, delay = 0 } = {}) {
                if (saveData.muted) return;
                const ac = ensureContext();
                if (!ac) return;
                const t0 = ac.currentTime + delay;
                const bufferSize = Math.max(1, Math.floor(ac.sampleRate * duration));
                const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                const src = ac.createBufferSource();
                src.buffer = buffer;
                const gain = ac.createGain();
                gain.gain.setValueAtTime(volume, t0);
                gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
                src.connect(gain).connect(ac.destination);
                src.start(t0);
            }

            return {
                // Call on first user gesture to unlock/resume the AudioContext
                unlock() { ensureContext(); },

                jump() { tone(340, 0.12, { type: 'square', volume: 0.14, slideTo: 640 }); },
                doubleJump() {
                    tone(520, 0.1, { type: 'square', volume: 0.13, slideTo: 900 });
                    tone(300, 0.08, { type: 'square', volume: 0.08, slideTo: 700, delay: 0.05 });
                },
                duck() { noise(0.08, { volume: 0.1 }); },
                coin() {
                    tone(880, 0.07, { type: 'square', volume: 0.12 });
                    tone(1318, 0.09, { type: 'square', volume: 0.12, delay: 0.06 });
                },
                powerup() {
                    [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.09, { type: 'triangle', volume: 0.12, delay: i * 0.06 }));
                },
                unlockSkin() {
                    [440, 554, 659, 880, 1108].forEach((f, i) => tone(f, 0.1, { type: 'triangle', volume: 0.11, delay: i * 0.05 }));
                },
                gameOver() {
                    tone(392, 0.18, { type: 'sawtooth', volume: 0.14, slideTo: 220 });
                    tone(220, 0.28, { type: 'sawtooth', volume: 0.12, slideTo: 110, delay: 0.16 });
                },
                bossAlert() {
                    tone(150, 0.25, { type: 'sawtooth', volume: 0.16, slideTo: 90 });
                    tone(100, 0.3, { type: 'sawtooth', volume: 0.14, slideTo: 60, delay: 0.15 });
                }
            };
        })();

        /* =========================================================================
         * THEME / DAY-NIGHT COLOR SYSTEM
         * ---------------------------------------------------------------------
         * Rather than a hard on/off dark-mode switch, the game's palette is
         * continuously interpolated between a "day" and "night" set of colors
         * based on the player's score. `theme` is recomputed once per frame.
         * ========================================================================= */
        const PALETTE = {
            // `obstacle` is a dedicated, deliberately high-contrast color for
            // cacti/birds -- kept independent from `entity` (the dino's own
            // color) so obstacles never blend into the dino, the ground, or
            // the sky as the day/night cycle shifts those other colors.
            //   day:   very dark (near-black maroon) against the light
            //          sky/ground (#eaf6ff / #ffffff / #eeeeee)
            //   night: bright/luminous (glowing orange) against the dark
            //          sky/ground (#0b1130 / #1c2350 / #2c3049)
            day:   { skyTop: '#eaf6ff', skyBottom: '#ffffff', ground: '#eeeeee', groundLine: '#c7c7c7', entity: '#535353', cloud: '#d5d5d5', obstacle: '#3a0d0d' },
            night: { skyTop: '#0b1130', skyBottom: '#1c2350', ground: '#2c3049', groundLine: '#4a4f72', entity: '#e7e9f5', cloud: '#4b5075', obstacle: '#ff6f3c' }
        };

        function hexToRgb(hex) {
            const clean = hex.replace('#', '');
            const num = parseInt(clean, 16);
            return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
        }
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, '0')).join('');
        }
        // t=0 -> hexA, t=1 -> hexB
        function lerpColor(hexA, hexB, t) {
            const a = hexToRgb(hexA), b = hexToRgb(hexB);
            return rgbToHex(a.r + (b.r - a.r) * t, a.g + (b.g - a.g) * t, a.b + (b.b - a.b) * t);
        }

        // Returns 1 = full day, 0 = full night, smoothly oscillating with score
        function getDayFactor(currentScore) {
            const pos = (currentScore % CYCLE_LENGTH) / CYCLE_LENGTH; // 0..1
            const wave = Math.cos(pos * Math.PI * 2); // 1 -> -1 -> 1
            return (wave + 1) / 2;
        }

        let theme = {};          // Current frame's resolved color palette
        let dinoColor = '#535353'; // Convenience alias to theme.entity, used by all entities
        let isSceneDark = false;   // Coarse flag for binary choices (e.g. eye/contrast color)

        function updateTheme() {
            const dayFactor = getDayFactor(score);
            isSceneDark = dayFactor < 0.5;
            theme = {
                skyTop: lerpColor(PALETTE.night.skyTop, PALETTE.day.skyTop, dayFactor),
                skyBottom: lerpColor(PALETTE.night.skyBottom, PALETTE.day.skyBottom, dayFactor),
                ground: lerpColor(PALETTE.night.ground, PALETTE.day.ground, dayFactor),
                groundLine: lerpColor(PALETTE.night.groundLine, PALETTE.day.groundLine, dayFactor),
                entity: lerpColor(PALETTE.night.entity, PALETTE.day.entity, dayFactor),
                cloud: lerpColor(PALETTE.night.cloud, PALETTE.day.cloud, dayFactor),
                // High-contrast obstacle color -- interpolated independently
                // of `entity` so cacti/birds stay legible against the ground
                // and sky throughout the whole day/night transition, instead
                // of fading toward the dino's own (much lower-contrast) color.
                obstacle: lerpColor(PALETTE.night.obstacle, PALETTE.day.obstacle, dayFactor),
                contrast: isSceneDark ? '#0b1130' : '#ffffff', // eye-whites / cutout color
                starAlpha: 1 - dayFactor
            };
            dinoColor = theme.entity;
        }

        // Fixed starfield (positions only computed once)
        const stars = Array.from({ length: 40 }, () => ({
            x: Math.random() * CANVAS_WIDTH,
            y: Math.random() * (GROUND_Y - 20),
            size: Math.random() < 0.8 ? 1 : 2
        }));

        /* =========================================================================
         * PARTICLE SYSTEM
         * ---------------------------------------------------------------------
         * A single generic Particle class powers dust trails, crash explosions,
         * and pickup sparkles -- they only differ in spawn parameters.
         * ========================================================================= */
        class Particle {
            constructor(x, y, opts = {}) {
                this.x = x;
                this.y = y;
                this.vx = opts.vx ?? (Math.random() - 0.5) * 2;
                this.vy = opts.vy ?? -Math.random() * 2;
                this.size = opts.size ?? (2 + Math.random() * 2);
                this.color = opts.color ?? dinoColor;
                this.gravity = opts.gravity ?? 0.15;
                this.life = opts.life ?? 25;
                this.maxLife = this.life;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life--;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
            get dead() { return this.life <= 0; }
        }

        let particles = []; // All active FX particles (dust, explosions, sparkles)

        // Emits a radial burst of particles -- used for explosions & pickup sparkles
        function spawnBurst(x, y, count, colorOrColors, opts = {}) {
            for (let i = 0; i < count; i++) {
                const color = Array.isArray(colorOrColors)
                    ? colorOrColors[Math.floor(Math.random() * colorOrColors.length)]
                    : colorOrColors;
                particles.push(new Particle(x, y, {
                    vx: (Math.random() - 0.5) * (opts.spread ?? 6),
                    vy: -(Math.random() * (opts.power ?? 5)) - (opts.upBias ?? 0.5),
                    size: opts.size ?? (2 + Math.random() * 3),
                    color,
                    life: opts.life ?? (20 + Math.random() * 15),
                    gravity: opts.gravity ?? 0.22
                }));
            }
        }

        // A single puff of dust kicked up behind the dino's feet while running
        function spawnDust(x, y) {
            particles.push(new Particle(x, y, {
                vx: -gameSpeed * 0.3 - Math.random() * 1.2,
                vy: -Math.random() * 1,
                size: 1 + Math.random() * 2,
                color: getSkinColors().body,
                life: 14 + Math.random() * 10,
                gravity: 0.04
            }));
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.dead) particles.splice(i, 1);
            }
        }

        // Small floating "+10" / "SHIELD!" style text popups for pickup feedback
        let floatingTexts = [];
        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 40, maxLife: 40 });
        }
        function updateAndDrawFloatingTexts() {
            ctx.font = '10px "Press Start 2P", monospace';
            ctx.textAlign = 'center';
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const t = floatingTexts[i];
                t.y -= 0.8;
                t.life--;
                ctx.globalAlpha = Math.max(0, t.life / t.maxLife);
                ctx.fillStyle = t.color;
                ctx.fillText(t.text, t.x, t.y);
                ctx.globalAlpha = 1;
                if (t.life <= 0) floatingTexts.splice(i, 1);
            }
            ctx.textAlign = 'start';
        }

        /* =========================================================================
         * SCREENSHAKE
         * ========================================================================= */
        let shakeDuration = 0;  // frames remaining
        let shakeMagnitude = 0; // px

        function triggerShake(magnitude, duration) {
            shakeMagnitude = Math.max(shakeMagnitude, magnitude);
            shakeDuration = Math.max(shakeDuration, duration);
        }

        // Applies a random translation for this frame only; canvas transform is
        // reset to identity at the top of every animate() call, so no restore needed.
        function applyShake() {
            if (shakeDuration > 0) {
                const dx = (Math.random() - 0.5) * shakeMagnitude;
                const dy = (Math.random() - 0.5) * shakeMagnitude;
                ctx.translate(dx, dy);
                shakeDuration--;
                shakeMagnitude *= 0.92; // decay
            }
        }

        /* =========================================================================
         * STATE VARIABLES
         * ========================================================================= */
        let frames = 0;
        let score = 0;
        let highScore = 0;
        let gameSpeed = INITIAL_SPEED;
        let isPlaying = false;
        let isGameOver = false;
        let animationId;

        let obstacles = [];
        let clouds = [];
        let collectibles = [];  // Coins & eggs
        let powerUps = [];      // Floating power-up pickups
        let groundMarks = [];   // Small ground-texture dashes

        let collectibleTimer = 0;
        let powerUpTimer = 0;

        // Active power-up countdowns, measured in frames remaining (0 = inactive)
        let activePowerUps = { shield: 0, doubleJump: 0, magnet: 0 };

        /* -------------------------------------------------------------------
         * BOSS PHASE STATE
         * ---------------------------------------------------------------------
         * isBossPhase gates normal obstacle/collectible/power-up spawning --
         * see the guards around those blocks in animate(). bossPhaseState only
         * has meaning while isBossPhase is true ('entering' while the boss
         * flies in from off-screen, 'active' during the 30s survival window).
         * `boss` and `bossExiting` deliberately live a little *longer* than
         * isBossPhase: once the survival timer completes, isBossPhase flips
         * back to false immediately (so normal gameplay resumes with zero
         * delay) while the boss finishes its own fly-away animation in the
         * background, tracked independently via bossExiting.
         * ------------------------------------------------------------------- */
        let isBossPhase = false;
        let bossPhaseState = null;   // 'entering' | 'active' | null
        let boss = null;             // current Boss instance, or null when no fight is on/ending
        let bossExiting = false;     // true while the boss flies off-screen after a completed fight
        let bossSurvivalFrames = 0;  // frames survived so far in the 'active' sub-phase
        let bossFireballTimer = 0;   // countdown (frames) to the next fireball spawn
        let fireballs = [];          // active Fireball projectiles
        let nextBossThreshold = 500; // next score value that triggers a boss phase (increments by 500 each fight)

        /* -------------------------------------------------------------------
         * CONTINUOUS AUTO-JUMP (bunny-hop) INPUT LATCH
         * ---------------------------------------------------------------------
         * True whenever ANY jump input -- Space/ArrowUp/KeyW, the mouse's left
         * button, or a touch/hold on mobile -- is currently being held down,
         * unified across all three input channels below. This is a level
         * (polled) flag, not an edge (one-shot) event: dino.update() checks it
         * on every frame the dino transitions from airborne back to grounded,
         * and immediately fires another jump on that exact frame if it's still
         * true, so a landing can never "eat" an input the player is still
         * physically holding down. See the ground-collision branch of
         * dino.update() for where it's consumed, and the CONTROLS section
         * further down for where each input channel sets/clears it.
         * ------------------------------------------------------------------- */
        let jumpHeld = false;

        /* =========================================================================
         * SKIN RENDERING HELPERS
         * ---------------------------------------------------------------------
         * Resolves the currently-equipped skin into concrete colors for drawing.
         * The 'classic' skin has colors: null, meaning it rides along with the
         * live day/night theme color exactly like the original game did.
         * ========================================================================= */
        function getEquippedSkin() {
            return SKINS.find(s => s.id === saveData.equippedSkin) || SKINS[0];
        }

        function getSkinColors() {
            const skin = getEquippedSkin();
            if (!skin.colors) {
                // Classic: dynamic theme-based color, same as the original game
                return { body: dinoColor, accent: dinoColor, eye: theme.contrast, glow: null, alpha: 1 };
            }
            return {
                body: skin.colors.body,
                accent: skin.colors.accent,
                eye: skin.colors.eye,
                glow: skin.glow || null,
                alpha: skin.alpha ?? 1
            };
        }

        // ---- small color/geometry utilities shared by every flair renderer ----

        function hexToRgba(hex, alpha) {
            const h = hex.replace('#', '');
            const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
            const n = parseInt(full, 16);
            return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
        }

        // Smooth 0..1 oscillation driven by the game's global `frames` counter --
        // deterministic (no Math.random jitter) so animation is silky, not staticky.
        function pulse01(freq, phase) {
            const f = (typeof frames !== 'undefined') ? frames : 0;
            return 0.5 + 0.5 * Math.sin(f * freq + (phase || 0));
        }

        // Anchor points relative to the dino's (x, y, w, h) box, valid for both the
        // standing (40x44) and ducking (56x26) hitboxes -- lets flair snap to the
        // head/eye/tail no matter which pose is currently active.
        function headAnchor(x, y, w, h, ducking) {
            return ducking ? { x: x + w * 0.857, y: y + h * 0.15 } : { x: x + w * 0.775, y: y };
        }
        function eyeAnchor(x, y, w, h, ducking) {
            return ducking ? { x: x + w * 0.857, y: y + h * 0.31 } : { x: x + w * 0.75, y: y + h * 0.136 };
        }
        function tailAnchor(x, y, w, h, ducking) {
            return ducking ? { x: x + w * 0.05, y: y + h * 0.5 } : { x: x + w * 0.05, y: y + h * 0.55 };
        }
        function bodyCenter(x, y, w, h) {
            return { x: x + w * 0.5, y: y + h * 0.5 };
        }

        // Soft radial glow -- the workhorse for every aura/halo effect.
        function auraGlow(ctx, cx, cy, radius, color, innerAlpha, outerAlpha) {
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            g.addColorStop(0, hexToRgba(color, innerAlpha));
            g.addColorStop(1, hexToRgba(color, outerAlpha == null ? 0 : outerAlpha));
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // Small dots orbiting a center point on a flattened (ellipse) path.
        function orbitDots(ctx, cx, cy, radius, count, size, color, speed, phase) {
            const f = (typeof frames !== 'undefined') ? frames : 0;
            ctx.fillStyle = color;
            for (let i = 0; i < count; i++) {
                const angle = (phase || 0) + f * speed + i * (Math.PI * 2 / count);
                const px = cx + Math.cos(angle) * radius;
                const py = cy + Math.sin(angle) * radius * 0.5;
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Deterministic "random-looking" sparkle scatter (index-seeded, not
        // Math.random) so it stays visually stable frame-to-frame instead of static-y.
        function sparklePoints(ctx, cx, cy, radius, count, color) {
            ctx.fillStyle = color;
            for (let i = 0; i < count; i++) {
                const angle = i * 2.4;
                const dist = radius * (0.25 + 0.75 * ((i * 37) % 10) / 10);
                const px = cx + Math.cos(angle) * dist;
                const py = cy + Math.sin(angle) * dist;
                const s = 1.5 + (i * 13) % 3;
                ctx.fillRect(px - s / 2, py - s / 2, s, s);
            }
        }

        function drawSparkle(ctx, cx, cy, size, color, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha == null ? 1 : alpha;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(cx, cy - size);
            ctx.lineTo(cx + size * 0.28, cy - size * 0.28);
            ctx.lineTo(cx + size, cy);
            ctx.lineTo(cx + size * 0.28, cy + size * 0.28);
            ctx.lineTo(cx, cy + size);
            ctx.lineTo(cx - size * 0.28, cy + size * 0.28);
            ctx.lineTo(cx - size, cy);
            ctx.lineTo(cx - size * 0.28, cy - size * 0.28);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // Jagged wing shape, mirrored left/right around (cx, cy). Reused by Angelic
        // (feathered), Demonic (bat) and Phoenix (flame) with different palettes.
        function drawWingPair(ctx, cx, cy, spanW, spanH, colorMain, colorEdge) {
            [-1, 1].forEach(side => {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(side, 1);
                ctx.fillStyle = colorMain;
                ctx.beginPath();
                ctx.moveTo(0, spanH * 0.1);
                ctx.lineTo(spanW * 0.35, -spanH * 0.25);
                ctx.lineTo(spanW * 0.65, -spanH * 0.55);
                ctx.lineTo(spanW * 0.55, -spanH * 0.15);
                ctx.lineTo(spanW * 0.9, -spanH * 0.1);
                ctx.lineTo(spanW * 0.62, spanH * 0.1);
                ctx.lineTo(spanW * 0.85, spanH * 0.32);
                ctx.lineTo(spanW * 0.5, spanH * 0.22);
                ctx.lineTo(spanW * 0.3, spanH * 0.4);
                ctx.lineTo(0, spanH * 0.15);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = colorEdge;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            });
        }

        // Simple 5-point crown, reused by Golden Dino and Golden God (different scale/colors).
        function drawCrown(ctx, hx, hy, scale, colorMain, colorGem) {
            ctx.save();
            ctx.translate(hx, hy);
            ctx.scale(scale, scale);
            ctx.fillStyle = colorMain;
            ctx.beginPath();
            ctx.moveTo(-10, 2);
            ctx.lineTo(-10, -5);
            ctx.lineTo(-5, 0);
            ctx.lineTo(0, -9);
            ctx.lineTo(5, 0);
            ctx.lineTo(10, -5);
            ctx.lineTo(10, 2);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = colorGem;
            ctx.fillRect(-1.5, -4, 3, 3);
            ctx.restore();
        }

        // ---- Tier 1-2 back renderers ----

        function backCamo() { /* no-op: Tier 1 starter flex stays minimal on purpose */ }

        function backRetro(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.6, sc.glow, 0.14, 0);
        }

        function backNinja(ctx, skin, sc, x, y, w, h, ducking) {
            const t = tailAnchor(x, y, w, h, ducking);
            for (let i = 0; i < 3; i++) {
                ctx.globalAlpha = 0.16 - i * 0.04;
                ctx.fillStyle = '#111111';
                ctx.beginPath();
                ctx.arc(t.x - i * 6, t.y + i * 2, 5 - i, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function backGolden(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.8, sc.glow, 0.22 + pulse01(0.06) * 0.08, 0);
        }

        function backNeonGlitch(ctx, skin, sc, x, y, w, h) {
            const f = (typeof frames !== 'undefined') ? frames : 0;
            const dir = (f % 10 < 5) ? 1 : -1;
            const offset = 2 + (f % 4);
            ctx.globalAlpha = 0.32;
            ctx.fillStyle = '#00e5ff';
            ctx.fillRect(x - offset * dir, y, w, h);
            ctx.fillStyle = '#ff2bd6';
            ctx.fillRect(x + offset * dir, y, w, h);
            ctx.globalAlpha = 0.1;
            auraGlow(ctx, x + w / 2, y + h / 2, Math.max(w, h) * 0.7, '#00e5ff', 0.6, 0);
        }

        function backMecha(ctx, skin, sc, x, y, w, h, ducking) {
            const t = tailAnchor(x, y, w, h, ducking);
            const r = 6 + pulse01(0.25) * 3;
            auraGlow(ctx, t.x - 4, t.y, r, sc.accent, 0.55, 0);
        }

        function backStreetDrip(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.55, sc.accent, 0.14, 0);
        }

        // ---- Tier 3 back renderers ----

        function backIceCrystal(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.75, sc.glow, 0.24, 0);
            sparklePoints(ctx, c.x, c.y, Math.max(w, h) * 0.7, 6, 'rgba(255,255,255,0.65)');
        }

        function backThunder(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.8, sc.glow, 0.16 + pulse01(0.4) * 0.18, 0);
        }

        function backToxicSlime(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.85, sc.glow, 0.18 + pulse01(0.08) * 0.1, 0);
            for (let i = 0; i < 4; i++) {
                const bob = pulse01(0.05, i * 1.7);
                ctx.globalAlpha = 0.35 * bob;
                ctx.fillStyle = sc.accent;
                ctx.beginPath();
                ctx.arc(c.x - w * 0.3 + i * (w * 0.2), y + h * (1.05 - bob * 0.4), 2 + (i % 2), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function backVoidShadow(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.9, '#0a0512', 0.5, 0);
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(c.x, c.y, Math.max(w, h) * 0.55, 0, Math.PI * 2);
            ctx.stroke();
            orbitDots(ctx, c.x, c.y, Math.max(w, h) * 0.55, 5, 1.6, sc.accent, 0.05);
        }

        function backPhoenixEmber(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            drawWingPair(ctx, c.x - w * 0.05, c.y, w * 0.9, h * 1.1, hexToRgba(sc.body, 0.85), sc.accent);
            orbitDots(ctx, c.x, c.y + h * 0.2, Math.max(w, h) * 0.6, 6, 1.6, sc.glow, -0.06);
        }

        // ---- Tier 4 back renderers ----

        function backAngelic(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            const halo = headAnchor(x, y, w, h, false);
            auraGlow(ctx, halo.x, halo.y, Math.max(w, h) * 0.35, sc.glow, 0.35, 0);
            drawWingPair(ctx, c.x - w * 0.08, c.y - h * 0.05, w * 1.15, h * 1.3, '#ffffff', sc.accent);
        }

        function backDemonic(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.9, sc.glow, 0.22 + pulse01(0.18) * 0.12, 0);
            drawWingPair(ctx, c.x - w * 0.05, c.y - h * 0.05, w * 1.2, h * 1.25, '#1a0303', sc.accent);
        }

        function backHoloMatrix(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            for (let i = 0; i < 4; i++) {
                const hue = ((typeof frames !== 'undefined' ? frames : 0) * 2 + i * 70) % 360;
                ctx.globalAlpha = 0.18 - i * 0.03;
                ctx.strokeStyle = `hsl(${hue}, 100%, 65%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(c.x, c.y, Math.max(w, h) * (0.45 + i * 0.14), 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function backQuantumPlasma(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 0.85, sc.glow, 0.28, 0);
            orbitDots(ctx, c.x, c.y, Math.max(w, h) * 0.65, 4, 2, sc.accent, 0.09);
            orbitDots(ctx, c.x, c.y, Math.max(w, h) * 0.45, 3, 1.6, '#ffffff', -0.12);
        }

        // ---- Tier 5 back renderers ----

        function backGoldenGod(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            auraGlow(ctx, c.x, c.y, Math.max(w, h) * 1.0, sc.glow, 0.3 + pulse01(0.06) * 0.12, 0);
            const f = (typeof frames !== 'undefined') ? frames : 0;
            ctx.globalAlpha = 0.28;
            ctx.fillStyle = sc.glow;
            for (let i = 0; i < 8; i++) {
                const ang = f * 0.01 + i * (Math.PI / 4);
                const r1 = Math.max(w, h) * 0.5, r2 = Math.max(w, h) * 0.95;
                ctx.beginPath();
                ctx.moveTo(c.x + Math.cos(ang) * r1, c.y + Math.sin(ang) * r1);
                ctx.lineTo(c.x + Math.cos(ang + 0.09) * r2, c.y + Math.sin(ang + 0.09) * r2);
                ctx.lineTo(c.x + Math.cos(ang - 0.09) * r2, c.y + Math.sin(ang - 0.09) * r2);
                ctx.closePath();
                ctx.fill();
            }
        }

        function backChronoLord(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            const f = (typeof frames !== 'undefined') ? frames : 0;
            for (let i = 0; i < 3; i++) {
                const r = Math.max(w, h) * (0.5 + ((f * 0.01 + i * 0.33) % 1) * 0.6);
                ctx.globalAlpha = 0.22 * (1 - ((f * 0.01 + i * 0.33) % 1));
                ctx.strokeStyle = sc.glow;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.globalAlpha = 0.55;
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 1.5;
            const ringR = Math.max(w, h) * 0.5;
            ctx.beginPath();
            ctx.arc(c.x, c.y, ringR, 0, Math.PI * 2);
            ctx.stroke();
            for (let i = 0; i < 12; i++) {
                const ang = f * 0.02 + i * (Math.PI / 6);
                const inner = ringR - 3, outer = ringR + 2;
                ctx.beginPath();
                ctx.moveTo(c.x + Math.cos(ang) * inner, c.y + Math.sin(ang) * inner);
                ctx.lineTo(c.x + Math.cos(ang) * outer, c.y + Math.sin(ang) * outer);
                ctx.stroke();
            }
        }

        function backInfinityDino(ctx, skin, sc, x, y, w, h) {
            const c = bodyCenter(x, y, w, h);
            const g = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, Math.max(w, h) * 0.95);
            g.addColorStop(0, hexToRgba('#7a5cff', 0.35));
            g.addColorStop(0.55, hexToRgba('#ff6ad5', 0.18));
            g.addColorStop(1, hexToRgba('#0a0a1a', 0));
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(c.x, c.y, Math.max(w, h) * 0.95, 0, Math.PI * 2);
            ctx.fill();
            sparklePoints(ctx, c.x, c.y, Math.max(w, h) * 0.9, 10, 'rgba(255,255,255,0.8)');
            orbitDots(ctx, c.x, c.y, Math.max(w, h) * 0.7, 6, 1.4, sc.accent, 0.04);
        }

        function backGlitchKing(ctx, skin, sc, x, y, w, h) {
            const f = (typeof frames !== 'undefined') ? frames : 0;
            const jx = ((f % 6) - 3) * 1.4;
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = '#ff0044';
            ctx.fillRect(x - 3 - jx, y, w, h);
            ctx.fillStyle = '#00ffe0';
            ctx.fillRect(x + 3 + jx, y, w, h);
            ctx.fillStyle = '#3dff5c';
            ctx.fillRect(x, y - jx, w, h);
            // flickering static bars
            for (let i = 0; i < 4; i++) {
                if ((f + i * 5) % 9 < 2) {
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x - 4, y + (h / 4) * i, w + 8, 2);
                }
            }
        }

        // ---- registry + public entry point ----

        const FLAIR_BACK_RENDERERS = {
            ghost: (ctx, skin, sc, x, y, w, h) => auraGlow(ctx, x + w / 2, y + h / 2, Math.max(w, h) * 0.75, sc.glow, 0.18, 0),
            camo: backCamo,
            retro: backRetro,
            ninja: backNinja,
            golden: backGolden,
            neonglitch: backNeonGlitch,
            mecha: backMecha,
            streetdrip: backStreetDrip,
            icecrystal: backIceCrystal,
            thunder: backThunder,
            toxicslime: backToxicSlime,
            voidshadow: backVoidShadow,
            phoenixember: backPhoenixEmber,
            angelic: backAngelic,
            demonic: backDemonic,
            holomatrix: backHoloMatrix,
            quantumplasma: backQuantumPlasma,
            goldengod: backGoldenGod,
            chronolord: backChronoLord,
            infinitydino: backInfinityDino,
            glitchking: backGlitchKing
        };

        // Draws skin-specific flourishes that belong BEHIND the body silhouette
        // (halos, auras, wings, orbit rings, trailing shadows). `x`/`y`/`w`/`h`/
        // `ducking` let this be reused both for the live in-game dino and the shop
        // preview canvas. Dispatches through FLAIR_BACK_RENDERERS instead of a long
        // if/else chain so each skin's effect stays independently readable.
        function drawSkinFlairBack(targetCtx, skin, sc, x, y, w, h, ducking) {
            if (!skin.colors) return; // classic has no extra flair
            const renderer = FLAIR_BACK_RENDERERS[skin.id];
            if (!renderer) return;
            targetCtx.save();
            renderer(targetCtx, skin, sc, x, y, w, h, ducking);
            targetCtx.restore();
        }

        // ---- Tier 1-2 front renderers ----

        function frontCyber(ctx, skin, sc, x, y, w, h, ducking) {
            ctx.fillStyle = sc.accent;
            ctx.fillRect(x + (ducking ? w * 0.72 : w * 0.5), y + 2, ducking ? w * 0.18 : w * 0.35, 3);
        }

        function frontWizard(ctx, skin, sc, x, y, w, h, ducking) {
            if (ducking) return;
            ctx.fillStyle = sc.accent;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.5, y - 2);
            ctx.lineTo(x + w * 0.72, y - h * 0.42);
            ctx.lineTo(x + w * 0.94, y - 2);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#ffd54a';
            ctx.fillRect(x + w * 0.68, y - h * 0.46, 4, 4);
        }

        function frontLava(ctx, skin, sc, x, y, w, h) {
            ctx.fillStyle = sc.accent;
            ctx.fillRect(x + w * 0.34, y + h * 0.32, 3, h * 0.28);
            ctx.fillRect(x + w * 0.56, y + h * 0.16, 3, h * 0.32);
        }

        function frontCamo(ctx, skin, sc, x, y, w, h) {
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = sc.accent;
            ctx.fillRect(x + w * 0.15, y + h * 0.25, w * 0.22, h * 0.18);
            ctx.fillRect(x + w * 0.5, y + h * 0.1, w * 0.18, h * 0.22);
            ctx.fillRect(x + w * 0.35, y + h * 0.55, w * 0.2, h * 0.16);
            ctx.fillStyle = '#2b3320';
            ctx.fillRect(x + w * 0.62, y + h * 0.42, w * 0.16, h * 0.14);
        }

        function frontRetro(ctx, skin, sc, x, y, w, h) {
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = sc.accent;
            for (let i = 0; i < Math.floor(h / 4); i++) {
                ctx.fillRect(x, y + i * 4, w, 1);
            }
            ctx.globalAlpha = 1;
            drawSparkle(ctx, x + w * 0.2, y + h * 0.2, 3, sc.accent);
            drawSparkle(ctx, x + w * 0.8, y + h * 0.75, 2.4, sc.accent);
        }

        function frontNinja(ctx, skin, sc, x, y, w, h, ducking) {
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.fillStyle = sc.accent;
            ctx.fillRect(x, e.y - 3, w, 4);
            ctx.beginPath();
            ctx.moveTo(x - 6, e.y - 1);
            ctx.lineTo(x - 1, e.y - 4);
            ctx.lineTo(x - 1, e.y + 2);
            ctx.closePath();
            ctx.fill();
            const f = (typeof frames !== 'undefined') ? frames : 0;
            ctx.save();
            ctx.translate(x + w * 0.15, y + h * 0.65);
            ctx.rotate(f * 0.15);
            ctx.fillStyle = '#c9c9c9';
            for (let i = 0; i < 4; i++) {
                ctx.rotate(Math.PI / 2);
                ctx.fillRect(0, 0, 4, 1.5);
            }
            ctx.restore();
        }

        function frontGolden(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            drawCrown(ctx, head.x, head.y - 2, ducking ? 0.35 : 0.5, sc.body, '#ff4d6d');
            drawSparkle(ctx, x + w * 0.15, y + h * 0.3, 2.5, '#fff6cf', 0.9);
            drawSparkle(ctx, x + w * 0.65, y + h * 0.7, 2, '#fff6cf', 0.8);
        }

        function frontNeonGlitch(ctx, skin, sc, x, y, w, h, ducking) {
            const f = (typeof frames !== 'undefined') ? frames : 0;
            for (let i = 0; i < 3; i++) {
                if ((f + i * 4) % 8 < 2) {
                    const gy = y + h * (0.2 + i * 0.28);
                    ctx.globalAlpha = 0.55;
                    ctx.fillStyle = i % 2 === 0 ? '#ff2bd6' : '#00e5ff';
                    ctx.fillRect(x - 2, gy, w + 4, 2);
                }
            }
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.globalAlpha = 0.9;
            ctx.fillStyle = sc.eye;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function frontMecha(ctx, skin, sc, x, y, w, h, ducking) {
            ctx.fillStyle = sc.accent;
            const blink = pulse01(0.3) > 0.5 ? 1 : 0.4;
            ctx.globalAlpha = blink;
            ctx.fillRect(x + w * 0.28, y + h * 0.4, 2.5, 2.5);
            ctx.fillRect(x + w * 0.55, y + h * 0.4, 2.5, 2.5);
            ctx.globalAlpha = 1;
            if (!ducking) {
                ctx.strokeStyle = sc.accent;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.8, y);
                ctx.lineTo(x + w * 0.86, y - h * 0.18);
                ctx.stroke();
                ctx.fillStyle = blink === 1 ? '#ff3b3b' : '#701818';
                ctx.beginPath();
                ctx.arc(x + w * 0.86, y - h * 0.18, 1.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function frontStreetDrip(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            if (!ducking) {
                ctx.fillStyle = sc.accent;
                ctx.fillRect(head.x - 9, head.y + h * 0.32, 12, 3);
            }
            ctx.fillStyle = '#111111';
            ctx.fillRect(x + w * (ducking ? 0.78 : 0.62), y + h * (ducking ? 0.22 : 0.06), 8, 4);
            ctx.fillStyle = sc.accent;
            ctx.fillRect(x + w * (ducking ? 0.7 : 0.55), y - (ducking ? 0 : 2), 10, 3);
        }

        // ---- Tier 3 front renderers ----

        function frontIceCrystal(ctx, skin, sc, x, y, w, h) {
            ctx.fillStyle = sc.accent;
            for (let i = 0; i < 3; i++) {
                const bx = x + w * (0.2 + i * 0.2), by = y + h * 0.18;
                ctx.beginPath();
                ctx.moveTo(bx, by);
                ctx.lineTo(bx + 3, by - 6 - i);
                ctx.lineTo(bx + 6, by);
                ctx.closePath();
                ctx.fill();
            }
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x + w * 0.95, y + h * 0.35, 2 + pulse01(0.1), 0, Math.PI * 2);
            ctx.fill();
        }

        function frontThunder(ctx, skin, sc, x, y, w, h, ducking) {
            if ((typeof frames !== 'undefined' ? frames : 0) % 14 < 5) {
                ctx.strokeStyle = sc.glow;
                ctx.lineWidth = 1.4;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.05, y - 2);
                ctx.lineTo(x + w * 0.15, y + h * 0.3);
                ctx.lineTo(x + w * 0.05, y + h * 0.35);
                ctx.lineTo(x + w * 0.2, y + h * 0.75);
                ctx.stroke();
            }
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = sc.glow;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function frontToxicSlime(ctx, skin, sc, x, y, w, h) {
            ctx.fillStyle = sc.accent;
            for (let i = 0; i < 3; i++) {
                const drip = 3 + pulse01(0.05, i) * 5;
                const dx = x + w * (0.25 + i * 0.25);
                ctx.beginPath();
                ctx.ellipse(dx, y + h + drip, 2, 3 + drip * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function frontVoidShadow(ctx, skin, sc, x, y, w, h, ducking) {
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 1.2;
            ctx.globalAlpha = 0.6;
            for (let i = 0; i < 2; i++) {
                const t = pulse01(0.06, i * 2);
                ctx.beginPath();
                ctx.moveTo(x + w * (0.1 + i * 0.7), y + h * 0.9);
                ctx.quadraticCurveTo(x + w * (0.1 + i * 0.7) - 6, y + h * (0.9 - t * 0.4), x + w * (0.1 + i * 0.7) - 3, y + h * (0.7 - t * 0.5));
                ctx.stroke();
            }
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.globalAlpha = 0.9;
            ctx.fillStyle = sc.eye;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function frontPhoenixEmber(ctx, skin, sc, x, y, w, h, ducking) {
            if (!ducking) {
                ctx.fillStyle = sc.accent;
                ctx.beginPath();
                ctx.moveTo(x + w * 0.62, y - h * 0.05);
                ctx.lineTo(x + w * 0.7, y - h * 0.28);
                ctx.lineTo(x + w * 0.78, y - h * 0.02);
                ctx.closePath();
                ctx.fill();
            }
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.fillStyle = sc.glow;
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // ---- Tier 4 front renderers ----

        function frontAngelic(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            ctx.globalAlpha = 0.85;
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(head.x, head.y - 6, 8, 3, 0, 0, Math.PI * 2);
            ctx.stroke();
            sparklePoints(ctx, x + w * 0.5, y + h * 0.5, Math.max(w, h) * 0.55, 5, 'rgba(255,242,184,0.8)');
        }

        function frontDemonic(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            ctx.fillStyle = sc.accent;
            ctx.beginPath();
            ctx.moveTo(head.x - 6, head.y + 2);
            ctx.quadraticCurveTo(head.x - 9, head.y - 6, head.x - 3, head.y - 4);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(head.x + 4, head.y + 2);
            ctx.quadraticCurveTo(head.x + 8, head.y - 6, head.x + 2, head.y - 4);
            ctx.closePath();
            ctx.fill();
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.fillStyle = sc.eye;
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function frontHoloMatrix(ctx, skin, sc, x, y, w, h) {
            const f = (typeof frames !== 'undefined') ? frames : 0;
            ctx.globalAlpha = 0.55;
            ctx.fillStyle = sc.accent;
            for (let i = 0; i < 4; i++) {
                const colX = x + (w / 4) * i + 2;
                const dropY = y + ((f * 1.5 + i * 17) % (h + 10)) - 8;
                ctx.fillRect(colX, dropY, 1.5, 6);
            }
            ctx.globalAlpha = 0.3;
            for (let i = 0; i < 3; i++) {
                const hue = (f * 3 + i * 90) % 360;
                ctx.strokeStyle = `hsl(${hue},100%,70%)`;
                ctx.lineWidth = 0.8;
                ctx.strokeRect(x - 1 + i, y - 1, w + 2, h + 2);
            }
        }

        function frontQuantumPlasma(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            const orbX = head.x + 6, orbY = head.y - 6;
            auraGlow(ctx, orbX, orbY, 6, sc.accent, 0.8, 0);
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(orbX, orbY, 1.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.moveTo(orbX, orbY);
            ctx.lineTo(head.x - 2, head.y + 4);
            ctx.stroke();
        }

        // ---- Tier 5 front renderers ----

        function frontGoldenGod(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            drawCrown(ctx, head.x, head.y - 3, ducking ? 0.4 : 0.6, sc.body, '#ff4d6d');
            sparklePoints(ctx, x + w * 0.5, y + h * 0.5, Math.max(w, h) * 0.75, 8, hexToRgba('#fff6cf', 0.9));
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 1.6, 0, Math.PI * 2);
            ctx.fill();
        }

        function frontChronoLord(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            const wx = head.x + 10, wy = head.y + 6;
            ctx.globalAlpha = 0.6;
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 0.8;
            ctx.setLineDash([1.5, 1.5]);
            ctx.beginPath();
            ctx.moveTo(head.x, head.y + 2);
            ctx.lineTo(wx, wy);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#1a1430';
            ctx.beginPath();
            ctx.arc(wx, wy, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 1;
            ctx.stroke();
            const f = (typeof frames !== 'undefined') ? frames : 0;
            ctx.strokeStyle = sc.eye;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(wx, wy);
            ctx.lineTo(wx + Math.cos(f * 0.1) * 3, wy + Math.sin(f * 0.1) * 3);
            ctx.moveTo(wx, wy);
            ctx.lineTo(wx + Math.cos(f * 0.025) * 2, wy + Math.sin(f * 0.025) * 2);
            ctx.stroke();
        }

        function frontInfinityDino(ctx, skin, sc, x, y, w, h, ducking) {
            const head = headAnchor(x, y, w, h, ducking);
            ctx.strokeStyle = sc.accent;
            ctx.lineWidth = 1.6;
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(head.x - 3, head.y - 4, 2.6, 0, Math.PI * 2);
            ctx.moveTo(head.x + 5.6, head.y - 4);
            ctx.arc(head.x + 3, head.y - 4, 2.6, 0, Math.PI * 2);
            ctx.stroke();
            sparklePoints(ctx, x + w * 0.5, y + h * 0.5, Math.max(w, h) * 0.6, 5, 'rgba(255,255,255,0.7)');
        }

        function frontGlitchKing(ctx, skin, sc, x, y, w, h, ducking) {
            const f = (typeof frames !== 'undefined') ? frames : 0;
            const head = headAnchor(x, y, w, h, ducking);
            // fragmented, jittering crown blocks instead of one solid shape
            for (let i = 0; i < 5; i++) {
                const jitter = ((f + i * 3) % 6) - 3;
                ctx.fillStyle = i % 2 === 0 ? sc.accent : sc.eye;
                ctx.fillRect(head.x - 10 + i * 5 + jitter * 0.3, head.y - 6 - (i % 2) * 3, 3, 4 + (i % 2) * 3);
            }
            // scanline distortion across the body
            for (let i = 0; i < 3; i++) {
                if ((f + i * 3) % 7 < 2) {
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = i % 2 === 0 ? '#ff0044' : '#00ffe0';
                    ctx.fillRect(x - 3, y + h * (0.25 + i * 0.25), w + 6, 1.5);
                }
            }
            const e = eyeAnchor(x, y, w, h, ducking);
            ctx.globalAlpha = 1;
            ctx.fillStyle = sc.eye;
            ctx.beginPath();
            ctx.arc(e.x, e.y, 2.6, 0, Math.PI * 2);
            ctx.fill();
        }

        // ---- registry + public entry point ----

        const FLAIR_FRONT_RENDERERS = {
            cyber: frontCyber,
            wizard: frontWizard,
            lava: frontLava,
            camo: frontCamo,
            retro: frontRetro,
            ninja: frontNinja,
            golden: frontGolden,
            neonglitch: frontNeonGlitch,
            mecha: frontMecha,
            streetdrip: frontStreetDrip,
            icecrystal: frontIceCrystal,
            thunder: frontThunder,
            toxicslime: frontToxicSlime,
            voidshadow: frontVoidShadow,
            phoenixember: frontPhoenixEmber,
            angelic: frontAngelic,
            demonic: frontDemonic,
            holomatrix: frontHoloMatrix,
            quantumplasma: frontQuantumPlasma,
            goldengod: frontGoldenGod,
            chronolord: frontChronoLord,
            infinitydino: frontInfinityDino,
            glitchking: frontGlitchKing
        };

        // Draws skin-specific flourishes that belong ON TOP of the body silhouette
