<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dino Run</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        html {
            height: 100%;
            overscroll-behavior-y: contain; /* Extra guard against Chrome/Android pull-to-refresh */
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #f7f7f7;
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
            overscroll-behavior-y: contain;
            -webkit-user-select: none;
            user-select: none;           /* No accidental text selection while swiping */
            -webkit-touch-callout: none;  /* No iOS long-press callout menu on the game surface */
            margin: 0;
            overflow: hidden;
        }

        /* =========================================================================
           FULL-PAGE VIEWPORT LAYOUT (UI/Layout Refactor)
           --------------------------------------------------------------------- */
        #game-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* dynamic viewport height -- accounts for mobile browser chrome */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* ---------------------------------------------------------------------
           RESPONSIVE VIEWPORT SCALING
           ------------------------------------------------------------------- */
        canvas {
            display: block;
            margin: 0 auto;
            background-color: transparent;
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        /* Safe-area aware HUD padding */
        #hud-title {
            top: max(0.75rem, env(safe-area-inset-top));
        }
        #powerup-bar {
            top: max(1rem, env(safe-area-inset-top));
            left: max(1rem, env(safe-area-inset-left));
        }
        #hud-score-bar {
            top: max(1rem, env(safe-area-inset-top));
            right: max(1rem, env(safe-area-inset-right));
        }

        #gameCanvas, #overlay {
            touch-action: none;          /* No native scroll/zoom/pull-to-refresh once a gesture starts on the play surface */
            -webkit-touch-callout: none;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #202124;
                color: #bdc1c6;
            }
        }

        /* --- Power-up status badges (top-left HUD) --- */
        .powerup-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(128, 128, 128, 0.12);
            border: 1px solid currentColor;
            border-radius: 4px;
            padding: 4px 6px 5px 6px;
            font-size: 10px;
            position: relative;
            overflow: hidden;
        }
        .powerup-badge .badge-icon {
            font-size: 12px;
            line-height: 1;
        }
        .powerup-badge .badge-time {
            font-size: 9px;
            min-width: 14px;
        }
        .powerup-badge .badge-track {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 2px;
            background: rgba(128, 128, 128, 0.3);
        }
        .powerup-badge .badge-fill {
            height: 100%;
            width: 100%;
            background: currentColor;
        }
    </style>
</head>
<body class="overflow-hidden transition-colors duration-300">

    <!-- Main Game Area -->
    <div id="game-container" class="relative">

        <h1 id="hud-title" class="absolute inset-x-0 text-center text-sm md:text-xl font-bold z-10 pointer-events-none opacity-80">T-REX RUN</h1>

        <!-- Power-up Status HUD -->
        <div id="powerup-bar" class="absolute flex gap-2 z-10 text-gray-600 dark:text-gray-400">
            <div id="badge-shield" class="powerup-badge hidden">
                <span class="badge-icon">🛡️</span><span class="badge-time">0s</span>
                <div class="badge-track"><div class="badge-fill"></div></div>
            </div>
            <div id="badge-doubleJump" class="powerup-badge hidden">
                <span class="badge-icon">⏫</span><span class="badge-time">0s</span>
                <div class="badge-track"><div class="badge-fill"></div></div>
            </div>
            <div id="badge-magnet" class="powerup-badge hidden">
                <span class="badge-icon">🧲</span><span class="badge-time">0s</span>
                <div class="badge-track"><div class="badge-fill"></div></div>
            </div>
        </div>

        <!-- Score Display -->
        <div id="hud-score-bar" class="absolute flex items-center gap-2 md:gap-5 text-sm md:text-base text-gray-600 dark:text-gray-400 z-10">
            <div id="coin-total" class="text-[9px] md:text-xs text-yellow-600 dark:text-yellow-400 whitespace-nowrap">🪙 0</div>
            <div class="whitespace-nowrap">HI <span id="high-score">00000</span></div>
            <div id="current-score">00000</div>
        </div>

        <!-- Start / Game Over Overlay -->
        <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 cursor-pointer">
            <div id="game-over-text" class="hidden text-xl md:text-2xl text-gray-700 dark:text-gray-200 mb-6">GAME OVER</div>
            <button id="start-btn" class="px-4 py-2 border-2 border-gray-400 dark:border-gray-500 rounded text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                Tap to Play
            </button>
            <button id="shop-btn" class="mt-3 px-3 py-1.5 border-2 border-yellow-400 dark:border-yellow-500 rounded text-[10px] md:text-xs text-yellow-600 dark:text-yellow-400 hover:bg-yellow-100 dark:hover:bg-yellow-900/30 transition-colors">
                🛒 Shop
            </button>
        </div>

        <!-- Shop Overlay -->
        <div id="shop-overlay" class="absolute inset-0 z-30 hidden flex items-center justify-center bg-black/70 p-4">
            <div id="shop-panel" class="bg-white dark:bg-gray-900 border-2 border-gray-400 dark:border-gray-600 rounded-lg p-4 md:p-5 max-w-sm w-full max-h-[92%] overflow-y-auto text-gray-700 dark:text-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs md:text-sm">🛒 SHOP</h2>
                    <div id="shop-coin-display" class="text-[10px] md:text-xs text-yellow-600 dark:text-yellow-400">🪙 0</div>
                </div>
                <div class="flex gap-2 mb-3">
                    <button id="tab-skins-btn" class="flex-1 text-[10px] md:text-xs px-2 py-1.5 border-2 rounded transition-colors border-yellow-400 bg-yellow-400/10 text-yellow-600 dark:text-yellow-400">🦖 Skins</button>
                    <button id="tab-trails-btn" class="flex-1 text-[10px] md:text-xs px-2 py-1.5 border-2 rounded transition-colors border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700">✨ Trails</button>
                </div>
                <div id="shop-grid" class="grid grid-cols-2 gap-3 pb-2"></div>
                <button id="shop-close-btn" class="mt-4 w-full px-4 py-2 border-2 border-gray-400 dark:border-gray-500 rounded text-[10px] md:text-xs hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    Close
                </button>
            </div>
        </div>

        <!-- The Canvas -->
        <canvas id="gameCanvas" width="800" height="250" class="mx-auto max-w-full"></canvas>
    </div>

        function fitCanvasToViewport() {
            const aspectRatio = CANVAS_WIDTH / CANVAS_HEIGHT;
            const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const SAFE_PAD = 12;
            const availableWidth = Math.max(160, viewportWidth - SAFE_PAD * 2);
            const availableHeight = Math.max(120, viewportHeight - SAFE_PAD * 2);

            let targetWidth = availableWidth;
            let targetHeight = targetWidth / aspectRatio;
            if (targetHeight > availableHeight) {
                targetHeight = availableHeight;
                targetWidth = targetHeight * aspectRatio;
            }

            canvas.style.width = Math.floor(targetWidth) + 'px';
            canvas.style.height = Math.floor(targetHeight) + 'px';
        }

        window.addEventListener('resize', fitCanvasToViewport);
        window.addEventListener('orientationchange', fitCanvasToViewport);

        const SAVE_KEY = 'dinoRunSaveV1';
        let saveData = { highScore: 0, coins: 0, unlockedSkins: ['classic'], equippedSkin: 'classic', unlockedTrails: ['none'], equippedTrail: 'none', muted: false };

        function loadSave() {
            try {
                const raw = localStorage.getItem(SAVE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    saveData = Object.assign({}, saveData, parsed);
                    if (!Array.isArray(saveData.unlockedSkins) || !saveData.unlockedSkins.includes('classic')) {
                        saveData.unlockedSkins = Array.isArray(saveData.unlockedSkins) ? saveData.unlockedSkins : [];
                        saveData.unlockedSkins.push('classic');
                    }
                    if (!SKINS.find(s => s.id === saveData.equippedSkin)) saveData.equippedSkin = 'classic';
                    if (!Array.isArray(saveData.unlockedTrails) || !saveData.unlockedTrails.includes('none')) {
                        saveData.unlockedTrails = Array.isArray(saveData.unlockedTrails) ? saveData.unlockedTrails : [];
                        saveData.unlockedTrails.push('none');
                    }
                    if (!TRAILS.find(t => t.id === saveData.equippedTrail)) saveData.equippedTrail = 'none';
                }
            } catch (err) {}
        }
        
        function persistSave() {
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); } catch (err) {}
        }
        function updateCoinDisplay() { coinTotalElement.textContent = '🪙 ' + saveData.coins; }

        const Sound = (() => {
            let audioCtx = null;
            function ensureContext() {
                if (!audioCtx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) audioCtx = new AC();
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }
            function tone(freq, duration, { type = 'square', volume = 0.15, slideTo = null, delay = 0 } = {}) {
                if (saveData.muted) return;
                const ac = ensureContext();
                if (!ac) return;
                const t0 = ac.currentTime + delay;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t0);
                if (slideTo !== null) osc.frequency.linearRampToValueAtTime(slideTo, t0 + duration);
                gain.gain.setValueAtTime(volume, t0);
                gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
                osc.connect(gain).connect(ac.destination);
                osc.start(t0);
                osc.stop(t0 + duration + 0.02);
            }
            function noise(duration, { volume = 0.12, delay = 0 } = {}) {
                if (saveData.muted) return;
                const ac = ensureContext();
                if (!ac) return;
                const t0 = ac.currentTime + delay;
                const bufferSize = Math.max(1, Math.floor(ac.sampleRate * duration));
                const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                const src = ac.createBufferSource();
                src.buffer = buffer;
                const gain = ac.createGain();
                gain.gain.setValueAtTime(volume, t0);
                gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
                src.connect(gain).connect(ac.destination);
                src.start(t0);
            }
            return {
                unlock() { ensureContext(); },
                jump() { tone(340, 0.12, { type: 'square', volume: 0.14, slideTo: 640 }); },
                doubleJump() {
                    tone(520, 0.1, { type: 'square', volume: 0.13, slideTo: 900 });
                    tone(300, 0.08, { type: 'square', volume: 0.08, slideTo: 700, delay: 0.05 });
                },
                duck() { noise(0.08, { volume: 0.1 }); },
                coin() { tone(880, 0.07, { type: 'square', volume: 0.12 }); tone(1318, 0.09, { type: 'square', volume: 0.12, delay: 0.06 }); },
                powerup() { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.09, { type: 'triangle', volume: 0.12, delay: i * 0.06 })); },

    }

            pctx.clearRect(0, 0, W, H);
            if (trail.id === 'none') {
                pctx.strokeStyle = '#999999'; pctx.lineWidth = 1; pctx.setLineDash([3, 3]);
                pctx.strokeRect(6, 6, W - 12, H - 12); pctx.setLineDash([]);
                pctx.fillStyle = '#999999'; pctx.font = '8px monospace'; pctx.textAlign = 'center';
                pctx.fillText('NONE', W / 2, H / 2 + 3); pctx.textAlign = 'start';
                return;
            }
            const colors = trail.colors, cx = W * 0.72, cy = H * 0.55;
            pctx.fillStyle = '#535353'; pctx.fillRect(cx - 5, cy - 10, 10, 18);
            for (let i = 0; i < 7; i++) {
                const x = cx - 12 - i * 6.5, y = cy + Math.sin(i * 1.3) * 4;
                pctx.globalAlpha = Math.max(0, 1 - i * 0.13);
                pctx.fillStyle = colors[i % colors.length];
                pctx.beginPath(); pctx.arc(x, y, Math.max(0.5, 3 - i * 0.3), 0, Math.PI * 2); pctx.fill();
            }
            pctx.globalAlpha = 1;
        }
        let shopTab = 'skins';
        function setShopTab(tab) {
            shopTab = tab;
            tabSkinsBtn.className = 'flex-1 text-[10px] md:text-xs px-2 py-1.5 border-2 rounded transition-colors ' + (tab === 'skins' ? 'border-yellow-400 bg-yellow-400/10 text-yellow-600 dark:text-yellow-400' : 'border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700');
            tabTrailsBtn.className = 'flex-1 text-[10px] md:text-xs px-2 py-1.5 border-2 rounded transition-colors ' + (tab === 'trails' ? 'border-yellow-400 bg-yellow-400/10 text-yellow-600 dark:text-yellow-400' : 'border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700');
            renderShop();
        }
        function renderSkinGrid() {
            shopGrid.innerHTML = '';
            SKINS.forEach(skin => {
                const owned = saveData.unlockedSkins.includes(skin.id), equipped = saveData.equippedSkin === skin.id;
                const card = document.createElement('div'); card.className = 'border-2 rounded p-2 flex flex-col items-center gap-1 text-center ' + (equipped ? 'border-yellow-400 bg-yellow-400/5' : 'border-gray-300 dark:border-gray-600');
                const prevCanvas = document.createElement('canvas'); prevCanvas.width = 60; prevCanvas.height = 72; prevCanvas.className = 'mx-auto'; prevCanvas.style.width = '48px'; prevCanvas.style.height = '58px'; drawSkinPreview(prevCanvas, skin);
                const name = document.createElement('div'); name.className = 'text-[9px] md:text-[10px] mt-1'; name.textContent = skin.name;
                const actionBtn = document.createElement('button'); actionBtn.className = 'text-[8px] md:text-[9px] px-2 py-1 rounded border w-full mt-1 transition-colors';
                if (equipped) { actionBtn.textContent = 'EQUIPPED'; actionBtn.disabled = true; actionBtn.className += ' bg-yellow-400/20 border-yellow-400 text-yellow-600 dark:text-yellow-400 cursor-default'; }
                else if (owned) { actionBtn.textContent = 'EQUIP'; actionBtn.className += ' border-gray-400 dark:border-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700'; actionBtn.addEventListener('click', (e) => { e.stopPropagation(); saveData.equippedSkin = skin.id; persistSave(); renderShop(); }); }
                else {
                    const canAfford = saveData.coins >= skin.cost; actionBtn.textContent = '🪙 ' + skin.cost;
                    actionBtn.className += canAfford ? ' border-green-400 text-green-600 dark:text-green-400 hover:bg-green-100 dark:hover:bg-green-900/30' : ' border-gray-300 dark:border-gray-600 text-gray-400 dark:text-gray-500 cursor-not-allowed';
                    if (!canAfford) actionBtn.disabled = true;
                    actionBtn.addEventListener('click', (e) => { e.stopPropagation(); if (saveData.coins < skin.cost) return; saveData.coins -= skin.cost; saveData.unlockedSkins.push(skin.id); saveData.equippedSkin = skin.id; persistSave(); updateCoinDisplay(); Sound.unlockSkin(); renderShop(); });
                }
                card.appendChild(prevCanvas); card.appendChild(name); card.appendChild(actionBtn); shopGrid.appendChild(card);
            });
        }
        function renderTrailGrid() {
            shopGrid.innerHTML = '';
            TRAILS.forEach(trail => {
                const owned = saveData.unlockedTrails.includes(trail.id), equipped = saveData.equippedTrail === trail.id;
                const card = document.createElement('div'); card.className = 'border-2 rounded p-2 flex flex-col items-center gap-1 text-center ' + (equipped ? 'border-yellow-400 bg-yellow-400/5' : 'border-gray-300 dark:border-gray-600');
                const prevCanvas = document.createElement('canvas'); prevCanvas.width = 60; prevCanvas.height = 44; prevCanvas.className = 'mx-auto'; prevCanvas.style.width = '54px'; prevCanvas.style.height = '40px'; drawTrailPreview(prevCanvas, trail);
                const name = document.createElement('div'); name.className = 'text-[9px] md:text-[10px] mt-1'; name.textContent = trail.name;
                const actionBtn = document.createElement('button'); actionBtn.className = 'text-[8px] md:text-[9px] px-2 py-1 rounded border w-full mt-1 transition-colors';
                if (equipped) { actionBtn.textContent = 'EQUIPPED'; actionBtn.disabled = true; actionBtn.className += ' bg-yellow-400/20 border-yellow-400 text-yellow-600 dark:text-yellow-400 cursor-default'; }
                else if (owned) { actionBtn.textContent = 'EQUIP'; actionBtn.className += ' border-gray-400 dark:border-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700'; actionBtn.addEventListener('click', (e) => { e.stopPropagation(); saveData.equippedTrail = trail.id; persistSave(); renderShop(); }); }
                else {
                    const canAfford = saveData.coins >= trail.cost; actionBtn.textContent = '🪙 ' + trail.cost;
                    actionBtn.className += canAfford ? ' border-green-400 text-green-600 dark:text-green-400 hover:bg-green-100 dark:hover:bg-green-900/30' : ' border-gray-300 dark:border-gray-600 text-gray-400 dark:text-gray-500 cursor-not-allowed';
                    if (!canAfford) actionBtn.disabled = true;
                    actionBtn.addEventListener('click', (e) => { e.stopPropagation(); if (saveData.coins < trail.cost) return; saveData.coins -= trail.cost; saveData.unlockedTrails.push(trail.id); saveData.equippedTrail = trail.id; persistSave(); updateCoinDisplay(); Sound.unlockSkin(); renderShop(); });
                }
                card.appendChild(prevCanvas); card.appendChild(name); card.appendChild(actionBtn); shopGrid.appendChild(card);
            });
        }
        function renderShop() {
            shopCoinDisplay.textContent = '🪙 ' + saveData.coins;
            if (shopTab === 'trails') renderTrailGrid(); else renderSkinGrid();
        }
        function openShop() { shopOpen = true; jumpHeld = false; renderShop(); shopOverlay.classList.remove('hidden'); }
        function closeShop() { shopOpen = false; shopOverlay.classList.add('hidden'); }

        function handleJump(e) {
            if (shopOpen) return; Sound.unlock(); if (e.type !== 'touchstart') e.preventDefault();
            if (isGameOver || !isPlaying) { initGame(); isPlaying = true; } else { dino.jump(); }
        }
        function handleDuck(e, isDucking) { if (shopOpen) return; if (isPlaying && !isGameOver) dino.duck(isDucking); }

        const JUMP_KEYS = new Set(['Space', 'ArrowUp', 'KeyW']), DUCK_KEYS = new Set(['ArrowDown', 'KeyS']);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Escape' && shopOpen) { closeShop(); return; } if (shopOpen) return;
            if (JUMP_KEYS.has(e.code)) { e.preventDefault(); jumpHeld = true; if (e.repeat) return; handleJump(e); }
            else if (DUCK_KEYS.has(e.code)) { e.preventDefault(); if (e.repeat) return; handleDuck(e, true); }
        });
        window.addEventListener('keyup', (e) => { if (JUMP_KEYS.has(e.code)) jumpHeld = false; else if (DUCK_KEYS.has(e.code)) handleDuck(e, false); });

        function onJumpMouseDown(e) { jumpHeld = true; handleJump(e); }
        overlay.addEventListener('mousedown', onJumpMouseDown); canvas.addEventListener('mousedown', onJumpMouseDown);
        window.addEventListener('mouseup', () => { jumpHeld = false; });

        const SWIPE_THRESHOLD = 26, TAP_MAX_DURATION = 250; let touchState = null;
        function isInteractiveTarget(target) { return !!target.closest('#shop-btn, #shop-overlay, #shop-close-btn'); }
        function onTouchStart(e) {
            if (shopOpen || isInteractiveTarget(e.target) || e.touches.length !== 1) return; Sound.unlock();
            const t = e.touches[0]; touchState = { startX: t.clientX, startY: t.clientY, startTime: performance.now(), jumpFired: false, duckFired: false };
            if (!isPlaying || isGameOver) { e.preventDefault(); handleJump(e); touchState = null; return; }
            e.preventDefault(); jumpHeld = true;
        }
        function onTouchMove(e) {
            if (!touchState || shopOpen) return; const t = e.touches[0], dx = t.clientX - touchState.startX, dy = t.clientY - touchState.startY; e.preventDefault();
            if (Math.abs(dy) <= Math.abs(dx)) return;
            if (!touchState.jumpFired && !touchState.duckFired && dy < -SWIPE_THRESHOLD) { touchState.jumpFired = true; dino.jump(); }
            else if (!touchState.jumpFired && !touchState.duckFired && dy > SWIPE_THRESHOLD) { touchState.duckFired = true; dino.duck(true); }
        }
        function onTouchEnd(e) {
            jumpHeld = false; if (!touchState || shopOpen) return; const elapsed = performance.now() - touchState.startTime, wasTap = !touchState.jumpFired && !touchState.duckFired && elapsed <= TAP_MAX_DURATION;
            if (touchState.duckFired) dino.duck(false); if (wasTap && isPlaying && !isGameOver) dino.jump(); touchState = null;
        }
        function onTouchCancel() { jumpHeld = false; if (touchState && touchState.duckFired) dino.duck(false); touchState = null; }
        gameContainer.addEventListener('touchstart', onTouchStart, { passive: false }); gameContainer.addEventListener('touchmove', onTouchMove, { passive: false }); gameContainer.addEventListener('touchend', onTouchEnd, { passive: false }); gameContainer.addEventListener('touchcancel', onTouchCancel, { passive: false });

        shopBtn.addEventListener('mousedown', (e) => e.stopPropagation()); shopBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true }); shopBtn.addEventListener('click', (e) => { e.stopPropagation(); Sound.unlock(); openShop(); });
        shopCloseBtn.addEventListener('mousedown', (e) => e.stopPropagation()); shopCloseBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true }); shopCloseBtn.addEventListener('click', (e) => { e.stopPropagation(); closeShop(); });
        tabSkinsBtn.addEventListener('mousedown', (e) => e.stopPropagation()); tabSkinsBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true }); tabSkinsBtn.addEventListener('click', (e) => { e.stopPropagation(); if (shopTab !== 'skins') setShopTab('skins'); });
        tabTrailsBtn.addEventListener('mousedown', (e) => e.stopPropagation()); tabTrailsBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true }); tabTrailsBtn.addEventListener('click', (e) => { e.stopPropagation(); if (shopTab !== 'trails') setShopTab('trails'); });
        shopOverlay.addEventListener('mousedown', (e) => { if (e.target === shopOverlay) closeShop(); });
        /* =========================================================================
         * BOOT SYSTEM
         * ========================================================================= */
        loadSave(); highScore = saveData.highScore || 0; updateCoinDisplay();
        fitCanvasToViewport(); updateTheme(); ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); drawSky(); drawGround(); dino.draw(); updateScoreDisplay(); animate();

    </script>
