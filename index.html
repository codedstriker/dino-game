        // (visors, hats, crowns, glowing eyes, armor plating) so they're never
        // painted over and hidden by the solid body fill. Same dispatch pattern as
        // drawSkinFlairBack -- see FLAIR_FRONT_RENDERERS above.
        function drawSkinFlairFront(targetCtx, skin, sc, x, y, w, h, ducking) {
            if (!skin.colors) return; // classic has no extra flair
            const renderer = FLAIR_FRONT_RENDERERS[skin.id];
            if (!renderer) return;
            targetCtx.save();
            renderer(targetCtx, skin, sc, x, y, w, h, ducking);
            targetCtx.restore();
        }

        /* =========================================================================
         * ENTITY: DINOSAUR
         * ========================================================================= */
        const dino = {
            x: 50,
            y: GROUND_Y - 44,
            w: 40,
            h: 44,
            vy: 0,
            grounded: true,
            ducking: false,
            fastDropping: false, // NEW: true while a mid-air fast-drop dive is committed and unresolved
            duckHeld: false,     // NEW: raw "is the duck input currently held" state, tracked regardless of grounded/airborne
            runState: 0,   // Used for animating legs
            jumpsUsed: 0,  // Tracks jumps taken since last grounded (for double jump)

            jump: function () {
                const maxJumps = activePowerUps.doubleJump > 0 ? 2 : 1;
                if (this.grounded) {
                    this.vy = JUMP_FORCE;
                    this.grounded = false;
                    this.jumpsUsed = 1;
                    this.fastDropping = false; // a fresh jump always clears any previous dive commitment
                    spawnBurst(this.x + this.w / 2, GROUND_Y, 6, getSkinColors().body, { spread: 4, power: 2, life: 15, gravity: 0.3 });
                    Sound.jump();
                } else if (this.jumpsUsed < maxJumps) {
                    // Mid-air bonus jump granted by the Double Jump power-up
                    this.vy = JUMP_FORCE * 0.85;
                    this.jumpsUsed++;
                    this.fastDropping = false; // re-ascending cancels the dive so it can be re-triggered on the way back down
                    spawnBurst(this.x + this.w / 2, this.y + this.h, 10, POWERUP_COLORS.doubleJump, { spread: 6, power: 3, life: 20, gravity: 0.15 });
                    Sound.doubleJump();
                }
            },

            duck: function (isDucking) {
                // Track the raw "down held?" input state independent of
                // grounded/airborne status. update() reads this at the exact
                // moment of ground collision to decide whether to seamlessly
                // snap into the ducking hitbox on landing -- see below.
                this.duckHeld = isDucking;

                if (this.grounded) {
                    // --- Grounded ducking (unchanged from before) ---
                    const wasDucking = this.ducking;
                    this.ducking = isDucking;
                    if (isDucking) {
                        this.h = 26;
                        this.y = GROUND_Y - this.h;
                        this.w = 56;
                        if (!wasDucking) Sound.duck(); // only fire once per press, not on key-repeat
                    } else {
                        this.h = 44;
                        this.y = GROUND_Y - this.h;
                        this.w = 40;
                    }
                } else if (isDucking && !this.fastDropping) {
                    /* -----------------------------------------------------------
                     * MID-AIR FAST-DROP (arcade physics fix)
                     * ---------------------------------------------------------
                     * Previously this whole branch didn't exist -- ducking was
                     * strictly gated by `if (this.grounded)`, so pressing down
                     * while airborne did nothing at all.
                     *
                     * Now: pressing/holding "down" while airborne immediately
                     * overrides the current jump arc with a strong downward
                     * velocity (a "fast-drop" dive), regardless of how much
                     * upward velocity the jump still had left. `fastDropping`
                     * is a one-shot latch so repeated duck(true) calls while
                     * still airborne (e.g. key-repeat, or a touchmove firing
                     * again) don't keep re-slamming vy every frame -- the dive
                     * is applied once here, and normal GRAVITY in update()
                     * continues to accelerate it naturally from there.
                     *
                     * The hitbox itself deliberately stays the standing
                     * (40x44) box while airborne -- it only snaps to the
                     * wide ducking box (56x26) inside update(),
                     * at the exact frame the dino's y crosses GROUND_Y, so a
                     * fast-drop always resolves into a proper duck without the
                     * player ever needing to release and re-press down (as
                     * long as it's still held at the moment of landing).
                     * ----------------------------------------------------- */
                    this.vy = Math.max(this.vy, 14); // strong downward velocity; never *slower* than current fall speed
                    this.fastDropping = true;
                    Sound.duck(); // immediate audio feedback, same cue as a grounded duck-press
                }
            },

            update: function () {
                const wasGrounded = this.grounded;

                // Apply Gravity
                this.vy += GRAVITY;
                this.y += this.vy;

                // Ground Collision
                if (this.y >= GROUND_Y - this.h) {
                    const impactVy = this.vy;
                    this.grounded = true;
                    this.fastDropping = false; // any in-flight fast-drop dive resolves the instant it lands

                    /* -------------------------------------------------------
                     * SEAMLESS FAST-DROP -> DUCK TRANSITION
                     * -----------------------------------------------------
                     * If "down" is still held (this.duckHeld) the instant the
                     * dino's y crosses GROUND_Y, snap straight into the
                     * ducking hitbox right here instead of landing at
                     * standing height and waiting for a fresh duck() call on
                     * a later frame. This is what makes a fast-drop read as
                     * one continuous move (dive -> duck) instead of two
                     * separate inputs, exactly like the fix requires.
                     * If it's not held, land standing as normal.
                     * ----------------------------------------------------- */
                    if (this.duckHeld) {
                        this.ducking = true;
                        this.h = 26;
                        this.w = 56;
                    } else {
                        this.ducking = false;
                        this.h = 44;
                        this.w = 40;
                    }
                    this.y = GROUND_Y - this.h;
                    this.vy = 0;

                    if (!wasGrounded) {
                        this.jumpsUsed = 0;
                        if (impactVy > HARD_LANDING_VY) {
                            // Hard landing -- subtle camera shake + a puff of dust
                            triggerShake(6, 10);
                            spawnBurst(this.x + this.w / 2, GROUND_Y, 10, getSkinColors().body, { spread: 7, power: 4, life: 20 });
                        }

                        /* -----------------------------------------------------
                         * CONTINUOUS AUTO-JUMP (bunny-hop fix)
                         * ---------------------------------------------------------
                         * This is the exact frame the dino touches back down
                         * after being airborne (`wasGrounded` was false a
                         * moment ago, `this.grounded` was just set true a few
                         * lines up). Previously, a jump input held through
                         * this instant was simply lost -- the player had to
                         * fully release and press again, which is exactly
                         * where the perceived "input latency" described in
                         * the fix brief came from. Now: if `jumpHeld` is still
                         * true here, re-jump immediately, on this same frame,
                         * with zero added delay.
                         *
                         * DOUBLE JUMP PROTECTION: `this.jump()` re-checks
                         * `this.grounded` internally, and we just set it true
                         * above, so this call always takes jump()'s GROUNDED
                         * branch -- it can never fall into the mid-air Double
                         * Jump branch. That's what guarantees holding the
                         * button can't auto-consume the Double Jump power-up:
                         * the mid-air bonus jump can only ever fire from a
                         * *fresh* keydown/mousedown/tap arriving while
                         * `this.grounded` is already false, and this
                         * landing-triggered call never satisfies that.
                         *
                         * Guarded on `!this.ducking` so a held duck input
                         * (e.g. a fast-drop dive resolving into a duck right
                         * above) always wins over a stale/simultaneously-held
                         * jump input -- the two are contradictory actions,
                         * and preserving the seamless fast-drop-to-duck
                         * landing matters more than the rare case of a player
                         * holding both inputs at once.
                         * ----------------------------------------------- */
                        if (jumpHeld && !this.ducking) {
                            this.jump();
                        }
                    }
                } else {
                    this.grounded = false;
                }

                // Animation frames for running
                if (this.grounded && isPlaying) {
                    if (frames % 6 === 0) {
                        this.runState = this.runState === 0 ? 1 : 0;
                    }
                    // Kick up a light dust trail while sprinting
                    if (!isGameOver && frames % 4 === 0) {
                        spawnDust(this.x + (this.runState === 0 ? 8 : 24), GROUND_Y - 2);
                    }
                } else if (!this.grounded) {
                    this.runState = -1; // Static jumping pose
                }
            },

            draw: function () {
                const skin = getEquippedSkin();
                const sc = getSkinColors();

                // Shield visual indicator: pulsing translucent ring around the dino
                if (activePowerUps.shield > 0) {
                    const pulse = 0.5 + 0.5 * Math.sin(frames * 0.2);
                    ctx.save();
                    ctx.globalAlpha = 0.25 + pulse * 0.25;
                    ctx.strokeStyle = POWERUP_COLORS.shield;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x + this.w / 2, this.y + this.h / 2, Math.max(this.w, this.h) / 1.3 + pulse * 3, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                // Skin flair drawn *behind* the body (e.g. the ghost's halo glow)
                drawSkinFlairBack(ctx, skin, sc, this.x, this.y, this.w, this.h, this.ducking);

                ctx.globalAlpha = sc.alpha;
                ctx.fillStyle = sc.body;

                if (this.ducking) {
                    // Ducking Dino (Simplified block shape)
                    ctx.fillRect(this.x, this.y, this.w, this.h); // Main body
                    ctx.fillRect(this.x + 40, this.y + 4, 16, 12); // Head
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = sc.eye;
                    ctx.fillRect(this.x + 46, this.y + 6, 4, 4); // Eye
                } else {
                    // Standing/Running Dino (Pixel Art approximation using rects)
                    ctx.fillRect(this.x, this.y + 16, 10, 16);              // Tail
                    ctx.fillRect(this.x + 6, this.y + 12, 14, 20);          // Back
                    ctx.fillRect(this.x + 14, this.y + 12, 16, 22);         // Main Body
                    ctx.fillRect(this.x + 22, this.y, 18, 16);              // Neck/Head
                    ctx.fillRect(this.x + 40, this.y + 2, 12, 10);          // Snout
                    ctx.fillRect(this.x + 30, this.y + 18, 8, 6);           // Arm

                    ctx.globalAlpha = 1;
                    ctx.fillStyle = sc.eye;
                    ctx.fillRect(this.x + 28, this.y + 4, 4, 4);            // Eye

                    // Legs (Animated)
                    ctx.globalAlpha = sc.alpha;
                    ctx.fillStyle = sc.body;
                    if (this.runState === 0 || this.runState === -1) {
                        ctx.fillRect(this.x + 10, this.y + 34, 6, 10);
                        ctx.fillRect(this.x + 10, this.y + 42, 8, 4);
                        ctx.fillRect(this.x + 22, this.y + 34, 6, 6);
                    }
                    if (this.runState === 1 || this.runState === -1) {
                        ctx.fillRect(this.x + 10, this.y + 34, 6, 6);
                        ctx.fillRect(this.x + 22, this.y + 34, 6, 10);
                        ctx.fillRect(this.x + 22, this.y + 42, 8, 4);
                    }
                }
                ctx.globalAlpha = 1;

                // Skin flair drawn *on top* of the body (visor stripe, hat, lava cracks)
                drawSkinFlairFront(ctx, skin, sc, this.x, this.y, this.w, this.h, this.ducking);

                // Dead state eye replacement (drawn on top)
                if (isGameOver) {
                    ctx.fillStyle = sc.eye;
                    ctx.fillRect(this.x + (this.ducking ? 46 : 28), this.y + (this.ducking ? 6 : 4), 6, 6);
                    ctx.fillStyle = sc.body;
                    ctx.fillRect(this.x + (this.ducking ? 46 : 28), this.y + (this.ducking ? 6 : 4), 2, 2);
                    ctx.fillRect(this.x + (this.ducking ? 50 : 32), this.y + (this.ducking ? 10 : 8), 2, 2);
                }
            }
        };

        /* =========================================================================
         * ENTITY: OBSTACLE (Cactus / Bird)
         * ========================================================================= */
        class Obstacle {
            constructor(type) {
                this.x = CANVAS_WIDTH;
                this.type = type; // 0: small cactus, 1: large cactus, 2: bird
                this.passed = false;

                if (this.type === 0) {
                    this.w = 16 + Math.random() * 32;
                    this.h = 34;
                    this.y = GROUND_Y - this.h;
                } else if (this.type === 1) {
                    this.w = 24 + Math.random() * 24;
                    this.h = 46;
                    this.y = GROUND_Y - this.h;
                } else {
                    this.w = 42;
                    this.h = 32;
                    const heights = [GROUND_Y - 30, GROUND_Y - 50, GROUND_Y - 75];
                    this.y = heights[Math.floor(Math.random() * heights.length)];
                    this.wingState = 0;
                }
            }

            update() {
                this.x -= gameSpeed;
                if (this.type === 2 && frames % 15 === 0) {
                    this.wingState = this.wingState === 0 ? 1 : 0;
                }
            }

            draw() {
                // Use the dedicated obstacle color (not dinoColor) so cacti
                // and birds stay high-contrast against the ground/sky in
                // both day and night themes -- see PALETTE.obstacle / theme.obstacle above.
                ctx.fillStyle = theme.obstacle;

                if (this.type === 0 || this.type === 1) {
                    // Blocky cactus
                    ctx.fillRect(this.x + (this.w / 2) - 4, this.y, 8, this.h);
                    if (this.w > 20) {
                        ctx.fillRect(this.x, this.y + 10, 8, this.h - 20);
                        ctx.fillRect(this.x + 4, this.y + this.h - 14, (this.w / 2) - 4, 4);
                        ctx.fillRect(this.x + this.w - 8, this.y + 4, 8, this.h - 24);
                        ctx.fillRect(this.x + (this.w / 2), this.y + this.h - 20, (this.w / 2) - 4, 4);
                    }
                } else {
                    // Pterodactyl -- shared with the Boss Phase's giant Boss
                    // entity, see drawPterodactylShape() just below this class.
                    drawPterodactylShape(this.x, this.y, this.wingState, theme.obstacle);
                }
            }
        }

        /* =========================================================================
         * SHARED RENDERER: Pterodactyl silhouette
         * ---------------------------------------------------------------------
         * Both the small flying Obstacle (type === 2) above and the giant Boss
         * below draw from this single function, so the Boss unmistakably reads
         * as "the same bird, but huge" instead of a different sprite. `x`/`y`
         * are the shape's local top-left origin at 1:1 scale -- callers that
         * want it bigger wrap the call in ctx.translate()/ctx.scale() (see
         * Boss.draw()) rather than passing scaled coordinates in here.
         * ========================================================================= */
        function drawPterodactylShape(x, y, wingState, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x + 14, y + 12, 16, 8); // body
            ctx.fillRect(x + 30, y + 8, 12, 6);  // head
            ctx.fillRect(x + 36, y + 14, 6, 4);  // beak

            if (wingState === 0) {
                ctx.fillRect(x + 16, y, 10, 12);      // wing raised
                ctx.fillRect(x + 18, y - 6, 8, 6);    // wingtip
            } else {
                ctx.fillRect(x + 16, y + 20, 10, 8);  // wing lowered
                ctx.fillRect(x + 18, y + 28, 8, 6);   // wingtip
            }
        }

        /* =========================================================================
         * ENTITY: CLOUD (Background decoration)
         * ========================================================================= */
        class Cloud {
            constructor() {
                this.x = CANVAS_WIDTH + Math.random() * 100;
                this.y = 20 + Math.random() * 80;
                this.w = 46;
                this.h = 14;
                this.speed = gameSpeed * 0.2 + (Math.random() * 0.5);
            }
            update() {
                this.x -= this.speed;
            }
            draw() {
                ctx.fillStyle = theme.cloud;
                ctx.fillRect(this.x, this.y + 6, this.w, 8);
                ctx.fillRect(this.x + 8, this.y + 2, 24, 6);
                ctx.fillRect(this.x + 14, this.y, 12, 4);
            }
        }

        /* =========================================================================
         * ENTITY: COLLECTIBLE (Coin / rare Dino Egg)
         * ========================================================================= */
        class Collectible {
            constructor() {
                this.x = CANVAS_WIDTH + Math.random() * 100;
                this.isEgg = Math.random() < 0.15; // Eggs are rarer & worth more
                this.w = this.isEgg ? 16 : 14;
                this.h = this.isEgg ? 20 : 14;
                // Varying heights: low (reachable while running), mid, high (needs a jump)
                const tiers = [GROUND_Y - 26, GROUND_Y - 70, GROUND_Y - 110];
                this.baseY = tiers[Math.floor(Math.random() * tiers.length)];
                this.y = this.baseY;
                this.bob = Math.random() * Math.PI * 2;
                this.value = this.isEgg ? 25 : 10;
            }
            update() {
                this.x -= gameSpeed;
                this.bob += 0.1;
                this.y = this.baseY + Math.sin(this.bob) * 4;
            }
            draw() {
                const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
                ctx.save();
                if (this.isEgg) {
                    ctx.fillStyle = dinoColor;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = theme.contrast;
                    ctx.beginPath();
                    ctx.arc(cx - 3, cy - 4, 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#ffd54a';
                    ctx.beginPath();
                    ctx.arc(cx, cy, this.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#c9971f';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        /* =========================================================================
         * ENTITY: POWER-UP (Shield / Double Jump / Coin Magnet)
         * ========================================================================= */
        class PowerUp {
            constructor() {
                this.x = CANVAS_WIDTH + Math.random() * 60;
                this.type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                this.w = 22;
                this.h = 22;
                const tiers = [GROUND_Y - 40, GROUND_Y - 90, GROUND_Y - 130];
                this.baseY = tiers[Math.floor(Math.random() * tiers.length)];
                this.y = this.baseY;
                this.bob = Math.random() * Math.PI * 2;
            }
            update() {
                this.x -= gameSpeed;
                this.bob += 0.08;
                this.y = this.baseY + Math.sin(this.bob) * 5;
            }
            draw() {
                const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
                const color = POWERUP_COLORS[this.type];
                ctx.save();

                // Soft glow halo
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(cx, cy, 16, 0, Math.PI * 2);
                ctx.fill();

                // Solid badge
                ctx.globalAlpha = 1;
                ctx.beginPath();
                ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.fill();

                // Icon glyph
                ctx.fillStyle = '#ffffff';
                if (this.type === 'shield') {
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - 6);
                    ctx.lineTo(cx + 5, cy - 3);
                    ctx.lineTo(cx + 5, cy + 3);
                    ctx.lineTo(cx, cy + 7);
                    ctx.lineTo(cx - 5, cy + 3);
                    ctx.lineTo(cx - 5, cy - 3);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'doubleJump') {
                    ctx.beginPath();
                    ctx.moveTo(cx - 5, cy); ctx.lineTo(cx, cy - 6); ctx.lineTo(cx + 5, cy); ctx.lineTo(cx, cy - 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(cx - 5, cy + 6); ctx.lineTo(cx, cy); ctx.lineTo(cx + 5, cy + 6); ctx.lineTo(cx, cy + 4);
                    ctx.closePath();
                    ctx.fill();
                } else { // magnet
                    ctx.fillRect(cx - 5, cy - 5, 3, 10);
                    ctx.fillRect(cx + 2, cy - 5, 3, 10);
                    ctx.fillRect(cx - 5, cy + 5, 10, 3);
                }
                ctx.restore();
            }
        }

        /* =========================================================================
         * ENTITY: BOSS (Giant Pterodactyl) -- spawned by the Boss Phase
         * ---------------------------------------------------------------------
         * Enters from the right edge, settles into a hover on the right side
         * of the canvas (bobbing gently), and flies back off to the right once
         * the 30s survival window ends. Its silhouette is the exact same
         * drawPterodactylShape() used by the normal type===2 Obstacle bird,
         * just scaled way up via ctx.scale() -- see draw() below.
         * ========================================================================= */
        class Boss {
            constructor() {
                this.x = CANVAS_WIDTH + 60;                // starts just off the right edge
                this.hoverX = CANVAS_WIDTH - BOSS_W - 24;   // resting position, hugging the right side
                this.baseY = 30;
                this.y = this.baseY;
                this.bob = Math.random() * Math.PI * 2;
                this.wingState = 0;
                this.enterSpeed = 7;
                this.exitSpeed = 9;
            }
            update() {
                this.bob += 0.05;
                // A giant boss flaps slower/heavier than the small bird (every
                // 15 frames) -- every 10 frames reads as bigger, weightier wings.
                if (frames % 10 === 0) this.wingState = this.wingState === 0 ? 1 : 0;

                if (bossPhaseState === 'entering') {
                    this.x -= this.enterSpeed;
                    if (this.x <= this.hoverX) {
                        this.x = this.hoverX;
                        bossPhaseState = 'active'; // settled in -- the 30s survival window starts now
                    }
                } else if (bossPhaseState === 'active') {
                    this.y = this.baseY + Math.sin(this.bob) * 16; // gentle hover bob
                } else if (bossExiting) {
                    this.x += this.exitSpeed; // flying away off the right edge, post-fight
                }
            }
            draw() {
                // Menacing red aura behind the boss -- extra flavor on top of
                // the reused silhouette so it doesn't read as "just a big bird".
                auraGlow(ctx, this.x + BOSS_W / 2, this.y + BOSS_H / 2, BOSS_W * 0.65, '#ff3300', 0.22, 0);

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(BOSS_SCALE, BOSS_SCALE);
                drawPterodactylShape(0, 0, this.wingState, BOSS_COLOR);
                ctx.restore();

                // Glowing eye, positioned over the (scaled) head/beak area
                ctx.fillStyle = '#ffe066';
                ctx.beginPath();
                ctx.arc(this.x + 34 * BOSS_SCALE, this.y + 11 * BOSS_SCALE, BOSS_SCALE * 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        /* =========================================================================
         * ENTITY: FIREBALL -- the Boss's ranged attack during the survival phase
         * ---------------------------------------------------------------------
         * Spawned at one of two fixed heights (FIREBALL_JUMP_Y / FIREBALL_DUCK_Y)
         * so each one demands a specific dodge -- see spawnFireballWave().
         * ========================================================================= */
        class Fireball {
            constructor(y) {
                this.x = boss ? boss.x : CANVAS_WIDTH; // launches from the boss's current position
                this.y = y;
                this.w = 18;
                this.h = 18;
                this.speed = FIREBALL_SPEED;
                this.trailTick = 0;
            }
            update() {
                this.x -= this.speed;
                // Trailing embers -- reuses the existing generic Particle system
                this.trailTick++;
                if (this.trailTick % 2 === 0) {
                    particles.push(new Particle(this.x + this.w * 0.7, this.y + this.h / 2, {
                        vx: 1 + Math.random(), vy: (Math.random() - 0.5) * 0.6,
                        size: 2 + Math.random() * 2, color: '#ff8a3d', life: 14, gravity: 0
                    }));
                }
            }
            draw() {
                const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
                ctx.save();
                auraGlow(ctx, cx, cy, this.w, '#ff5c1a', 0.5, 0);
                ctx.fillStyle = '#ff3b00';
                ctx.beginPath(); ctx.arc(cx, cy, this.w / 2, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffd23f';
                ctx.beginPath(); ctx.arc(cx, cy, this.w / 2 * 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        /* =========================================================================
         * CORE GAME FUNCTIONS
         * ========================================================================= */

        function initGame() {
            obstacles = [];
            clouds = [];
            collectibles = [];
            powerUps = [];
            particles = [];
            floatingTexts = [];
            groundMarks = [];
            fireballs = [];

            score = 0;
            frames = 0;
            gameSpeed = INITIAL_SPEED;
            isGameOver = false;

            shakeDuration = 0;
            shakeMagnitude = 0;

            activePowerUps = { shield: 0, doubleJump: 0, magnet: 0 };
            updatePowerUpUI();

            // Fresh run -- no boss fight in progress, and the 500-point trigger
            // guard resets so a boss phase can fire again at score 500 this run.
            isBossPhase = false;
            bossPhaseState = null;
            boss = null;
            bossExiting = false;
            bossSurvivalFrames = 0;
            bossFireballTimer = 0;
            nextBossThreshold = 500;

            dino.grounded = true;      // guarantee a clean grounded state, in case the previous run
            dino.fastDropping = false; // ended mid-air/mid-dive (game over freezes dino.update())
            dino.y = GROUND_Y - dino.h;
            dino.vy = 0;
            dino.jumpsUsed = 0;
            dino.duck(false); // resets ducking/h/w/y to standing dimensions (and duckHeld to false)

            resetSpawnTimers();
            updateScoreDisplay();

            overlay.classList.add('hidden');
            gameOverText.classList.add('hidden');

            // Generate some initial clouds
            for (let i = 0; i < 3; i++) {
                let cloud = new Cloud();
                cloud.x = Math.random() * CANVAS_WIDTH;
                clouds.push(cloud);
            }
        }

        function resetSpawnTimers() {
            collectibleTimer = 60 + Math.random() * 60;
            powerUpTimer = 500 + Math.random() * 400;
        }

        function formatScore(s) {
            return Math.floor(s).toString().padStart(5, '0');
        }

        function updateScoreDisplay() {
            scoreElement.innerText = formatScore(score);
            highScoreElement.innerText = formatScore(highScore);

            // Flash score every 100 points
            if (Math.floor(score) % 100 === 0 && score > 0 && frames % 20 < 10) {
                scoreElement.style.opacity = 0;
            } else {
                scoreElement.style.opacity = 1;
            }
        }

        // Refreshes the top-left power-up HUD badges from `activePowerUps`
        function updatePowerUpUI() {
            POWERUP_TYPES.forEach(type => {
                const framesLeft = activePowerUps[type];
                const el = document.getElementById('badge-' + type);
                if (framesLeft > 0) {
                    el.classList.remove('hidden');
                    const pct = Math.max(0, (framesLeft / DURATION_FRAMES[type]) * 100);
                    el.querySelector('.badge-fill').style.width = pct + '%';
                    el.querySelector('.badge-time').textContent = Math.ceil(framesLeft / 60) + 's';
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        function activatePowerUp(type) {
            activePowerUps[type] = DURATION_FRAMES[type];
        }

        // Ticks down all active power-up timers by one frame
        function updatePowerUpTimers() {
            POWERUP_TYPES.forEach(type => {
                if (activePowerUps[type] > 0) activePowerUps[type]--;
            });
            updatePowerUpUI();
        }

        function drawSky() {
            const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            grad.addColorStop(0, theme.skyTop);
            grad.addColorStop(1, theme.skyBottom);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Stars fade in as night approaches
            if (theme.starAlpha > 0.05) {
                ctx.globalAlpha = theme.starAlpha;
                ctx.fillStyle = '#ffffff';
                stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));
                ctx.globalAlpha = 1;
            }

            drawCelestialBody();
        }

        // A single sun/moon disc that arcs across the sky in sync with the cycle
        function drawCelestialBody() {
            const pos = (score % CYCLE_LENGTH) / CYCLE_LENGTH; // 0..1 over the full cycle
            const isDayHalf = pos < 0.5;
            const t = isDayHalf ? pos / 0.5 : (pos - 0.5) / 0.5;
            const x = 40 + t * (CANVAS_WIDTH - 80);
            const y = 30 + (1 - Math.sin(t * Math.PI)) * 40;
            const color = isDayHalf ? '#ffd866' : '#eef1fb';

            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill(); // glow
            ctx.globalAlpha = 0.95;
            ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill(); // disc
            ctx.restore();
        }

        function drawGround() {
            // Filled ground band beneath the horizon line
            ctx.fillStyle = theme.ground;
            ctx.fillRect(0, GROUND_Y + 1, CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_Y - 1);

            ctx.fillStyle = theme.groundLine;
            ctx.fillRect(0, GROUND_Y, CANVAS_WIDTH, 1);

            if (isPlaying && !isGameOver && Math.random() < 0.2) {
                groundMarks.push({
                    x: CANVAS_WIDTH,
                    y: GROUND_Y + 4 + Math.random() * 16,
                    w: 2 + Math.random() * 4
                });
            }

            for (let i = groundMarks.length - 1; i >= 0; i--) {
                const m = groundMarks[i];
                if (isPlaying && !isGameOver) m.x -= gameSpeed;
                ctx.fillRect(m.x, m.y, m.w, 1);
                if (m.x < -10) groundMarks.splice(i, 1);
            }
        }

        // Forgiving hitbox check used for deadly obstacles (shrinks both rects)
        function checkObstacleCollision(r1, r2) {
            const paddingX = 8;
            const paddingY = 6;
            return (
                r1.x + paddingX < r2.x + r2.w - paddingX &&
                r1.x + r1.w - paddingX > r2.x + paddingX &&
                r1.y + paddingY < r2.y + r2.h - paddingY &&
                r1.y + r1.h - paddingY > r2.y + paddingY
            );
        }

        // Generous hitbox check used for pickups (slightly expanded, player-friendly)
        function checkPickupCollision(r1, r2) {
            const pad = 4;
            return (
                r1.x < r2.x + r2.w + pad &&
                r1.x + r1.w > r2.x - pad &&
                r1.y < r2.y + r2.h + pad &&
                r1.y + r1.h > r2.y - pad
            );
        }

        // Tighter hitbox check used for Boss Phase fireballs -- less forgiving
        // slack than checkObstacleCollision since a fireball is meant to read
        // as a precise, high-stakes dodge (jump/duck) rather than a grazing hit.
        function checkFireballCollision(r1, r2) {
            const paddingX = 4;
            const paddingY = 3;
            return (
                r1.x + paddingX < r2.x + r2.w - paddingX &&
                r1.x + r1.w - paddingX > r2.x + paddingX &&
                r1.y + paddingY < r2.y + r2.h - paddingY &&
                r1.y + r1.h - paddingY > r2.y + paddingY
            );
        }

        function gameOver() {
            isGameOver = true;
            isPlaying = false;
            if (score > highScore) {
                highScore = Math.floor(score);
                saveData.highScore = highScore;
            }
            persistSave(); // banks this run's high score (coins are already persisted on pickup)

            triggerShake(10, 18);
            spawnBurst(dino.x + dino.w / 2, dino.y + dino.h / 2, 26, [getSkinColors().body, '#ff5c5c'], { spread: 9, power: 6, life: 35, gravity: 0.25 });
            Sound.gameOver();

            overlay.classList.remove('hidden');
            gameOverText.classList.remove('hidden');
            startBtn.innerHTML = "Play Again";
        }

        /* =========================================================================
         * BOSS PHASE STATE MACHINE
         * ---------------------------------------------------------------------
         * triggerBossPhase()   -- fires once per 500-point threshold (called
         *                          from animate(), see the trigger check there)
         * updateAndDrawBoss()  -- called every frame of active gameplay; drives
         *                          the boss entity, fireball spawns/collisions,
         *                          the survival countdown, and the UI overlay
         * endBossSurvival()    -- called once the 30s timer completes
         * ========================================================================= */

        // Suspends normal spawning, wipes the arena, and sends in the boss.
        function triggerBossPhase() {
            isBossPhase = true;
            bossPhaseState = 'entering';
            bossSurvivalFrames = 0;
            bossFireballTimer = 90; // brief grace period after the boss settles in, before the first fireball
            fireballs = [];

            // Instantly empty the arena for a clean, focused boss encounter
            obstacles = [];
            collectibles = [];
            powerUps = [];

            boss = new Boss();
            bossExiting = false;

            spawnFloatingText(CANVAS_WIDTH / 2, 70, 'BOSS FIGHT!', '#ff3300');
            Sound.bossAlert();
            triggerShake(5, 20);
        }

        // Spawns one "wave" of fireballs at the dodge heights defined in CONFIG.
        // Occasionally throws both heights at once for a precise jump-then-duck
        // (or duck-then-jump) test, per the "distinct heights" requirement.
        function spawnFireballWave() {
            if (Math.random() < 0.3) {
                fireballs.push(new Fireball(FIREBALL_JUMP_Y));
                fireballs.push(new Fireball(FIREBALL_DUCK_Y));
            } else {
                fireballs.push(new Fireball(Math.random() < 0.5 ? FIREBALL_JUMP_Y : FIREBALL_DUCK_Y));
            }
        }

        // Called once the 30s survival window completes: pays out the reward
        // and hands control back to normal gameplay immediately (obstacles,
        // collectibles, and power-ups all resume spawning on the very next
        // frame) while the boss plays out its own exit-flight animation
        // independently, purely as a visual flourish -- see bossExiting.
        function endBossSurvival() {
            isBossPhase = false;
            bossPhaseState = null;
            bossExiting = true;
            fireballs = [];

            saveData.coins += BOSS_REWARD_COINS;
            persistSave();
            updateCoinDisplay();
            spawnFloatingText(CANVAS_WIDTH / 2, 90, '+' + BOSS_REWARD_COINS + ' COINS!', '#ffd700');
            Sound.powerup();
        }

        // Draws the "BOSS FIGHT" warning banner plus the 30s shrinking
        // countdown bar. Text uses a stroke+fill combo so it stays legible
        // against both the day and night sky palettes.
        function drawBossUI() {
            ctx.save();
            ctx.textAlign = 'center';

            // Pulsing warning banner
            const pulse = 0.6 + 0.4 * Math.sin(frames * 0.15);
            ctx.globalAlpha = pulse;
            ctx.font = '14px "Press Start 2P", monospace';
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
            ctx.strokeText('BOSS FIGHT', CANVAS_WIDTH / 2, 30);
            ctx.fillStyle = '#ff3300';
            ctx.fillText('BOSS FIGHT', CANVAS_WIDTH / 2, 30);
            ctx.globalAlpha = 1;

            if (bossPhaseState === 'active') {
                const remainingFrames = Math.max(0, BOSS_PHASE_DURATION_FRAMES - bossSurvivalFrames);
                const remainingSeconds = Math.ceil(remainingFrames / 60);
                const pct = remainingFrames / BOSS_PHASE_DURATION_FRAMES;

                // Shrinking survival bar
                const barW = 200, barH = 8, barX = CANVAS_WIDTH / 2 - barW / 2, barY = 42;
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = '#000000';
                ctx.fillRect(barX, barY, barW, barH);
                ctx.globalAlpha = 1;
                ctx.fillStyle = pct > 0.3 ? '#ff3300' : '#ffcc00';
                ctx.fillRect(barX, barY, barW * pct, barH);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(barX, barY, barW, barH);

                // Numeric countdown, stroke+fill for legibility on any sky color
                ctx.font = '10px "Press Start 2P", monospace';
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.strokeText(remainingSeconds + 's', CANVAS_WIDTH / 2, barY + barH + 16);
                ctx.fillStyle = '#000000';
                ctx.fillText(remainingSeconds + 's', CANVAS_WIDTH / 2, barY + barH + 16);
            } else {
                // 'entering' -- boss hasn't settled into its hover yet
                ctx.font = '9px "Press Start 2P", monospace';
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.strokeText('INCOMING...', CANVAS_WIDTH / 2, 50);
                ctx.fillStyle = '#000000';
                ctx.fillText('INCOMING...', CANVAS_WIDTH / 2, 50);
            }

            ctx.textAlign = 'start';
            ctx.restore();
        }

        // Drives the boss entity + its fireballs for exactly one frame. A
        // no-op whenever there's no boss on screen at all (the common case
        // outside of a boss encounter), so it's always safe to call
        // unconditionally from the main loop.
        function updateAndDrawBoss() {
            if (!boss) return;

            boss.update();
            boss.draw();

            // Fireballs only spawn/threaten the player during the 'active'
            // survival window (not while the boss is still flying in).
            if (isBossPhase && bossPhaseState === 'active') {
                bossSurvivalFrames++;

                bossFireballTimer--;
                if (bossFireballTimer <= 0) {
                    spawnFireballWave();
                    bossFireballTimer = FIREBALL_MIN_INTERVAL + Math.random() * FIREBALL_MAX_INTERVAL;
                }

                if (bossSurvivalFrames >= BOSS_PHASE_DURATION_FRAMES) {
                    endBossSurvival();
                }
            }

            for (let i = fireballs.length - 1; i >= 0; i--) {
                const fb = fireballs[i];
                fb.update();
                fb.draw();

                if (checkFireballCollision(dino, fb)) {
                    if (activePowerUps.shield > 0) {
                        // Shield absorbs the hit, same rule as normal obstacles
                        spawnBurst(fb.x + fb.w / 2, fb.y + fb.h / 2, 14, POWERUP_COLORS.shield, { spread: 8, power: 5, life: 25 });
                        triggerShake(4, 8);
                        fireballs.splice(i, 1);
                        continue;
                    } else {
                        gameOver();
                    }
                }
                if (fb.x + fb.w < 0) fireballs.splice(i, 1);
            }

            if (isBossPhase) drawBossUI();

            // The boss has fully flown off-screen after the fight -- release it
            // so this function goes back to being a no-op next frame.
            if (bossExiting && boss.x > CANVAS_WIDTH) {
                boss = null;
                bossExiting = false;
                bossPhaseState = null;
            }
        }

        /* =========================================================================
         * MAIN GAME LOOP
         * ========================================================================= */

        function animate() {
            animationId = requestAnimationFrame(animate);

            // Reset any screenshake transform from the previous frame
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            updateTheme();

            // --- Intro screen (not yet playing, not dead) ---
            if (!isPlaying && !isGameOver) {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                drawSky();
                drawGround();
                dino.draw();
                return;
            }

            // --- Game over: freeze gameplay entities, let FX finish playing out ---
            if (isGameOver) {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                applyShake();
                drawSky();
                drawGround();
                clouds.forEach(c => c.draw());
                obstacles.forEach(o => o.draw());
                collectibles.forEach(c => c.draw());
                powerUps.forEach(p => p.draw());
                if (boss) boss.draw();               // frozen mid-fight if that's how the run ended
                fireballs.forEach(fb => fb.draw());
                if (isBossPhase) drawBossUI();
                updateAndDrawParticles();
                updateAndDrawFloatingTexts();
                dino.draw();
                return;
            }

            // --- Active gameplay ---
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            applyShake();

            // Difficulty ramping & scoring
            frames++;
            if (frames % 10 === 0) {
                score += 0.5;
            }
            if (frames % 500 === 0 && gameSpeed < MAX_SPEED) {
                gameSpeed += 0.5;
            }

            updateScoreDisplay();
            updatePowerUpTimers();

            /* ---- BOSS PHASE TRIGGER ------------------------------------------
             * Fires once every 500 points, using an incrementing threshold
             * (>=) rather than an exact `score % 500 === 0` match. That
             * matters because score doesn't only climb in steady 0.5 ticks --
             * collectibles add straight to it too (+10 coin, +25 egg), so a
             * pickup can jump score clean over an exact multiple of 500
             * (e.g. 494 -> 504) and an exact-match check would silently never
             * fire. `nextBossThreshold` instead just asks "have we reached or
             * passed the next 500-mark yet?", so a boss phase always
             * triggers no matter how score gets there. */
            if (!isBossPhase && score >= nextBossThreshold) {
                nextBossThreshold += 500;
                triggerBossPhase();
            }

            // Background
            drawSky();
            drawGround();

            // Clouds
            if (frames % 120 === 0 && Math.random() > 0.3) {
                clouds.push(new Cloud());
            }
            for (let i = clouds.length - 1; i >= 0; i--) {
                clouds[i].update();
                clouds[i].draw();
                if (clouds[i].x + clouds[i].w < 0) clouds.splice(i, 1);
            }

            // Obstacles: spawn rate gets slightly faster as gameSpeed increases
            // (suspended entirely during a Boss Phase -- triggerBossPhase()
            // also instantly empties `obstacles` the moment the fight starts,
            // so the loop below naturally has nothing to do until it's over)
            if (!isBossPhase) {
                let spawnRate = Math.max(50, 120 - (gameSpeed * 3));
                if (frames % Math.floor(spawnRate) === 0 && Math.random() > 0.2) {
                    let type = Math.random() < 0.3 && score > 300 ? 2 : (Math.random() < 0.5 ? 0 : 1);
                    obstacles.push(new Obstacle(type));
                }
            }
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.update();
                obs.draw();

                if (checkObstacleCollision(dino, obs)) {
                    if (activePowerUps.shield > 0) {
                        // Shield absorbs the hit: destroy the obstacle instead of dying
                        spawnBurst(obs.x + obs.w / 2, obs.y + obs.h / 2, 14, POWERUP_COLORS.shield, { spread: 8, power: 5, life: 25 });
                        triggerShake(4, 8);
                        obstacles.splice(i, 1);
                        continue;
                    } else {
                        gameOver();
                    }
                }
                if (obs.x + obs.w < 0) obstacles.splice(i, 1);
            }

            // Collectibles: spawn, magnet-attract, collect
            // (frozen during a Boss Phase -- collectibleTimer simply stops
            // ticking down, so it resumes exactly where it left off afterwards)
            if (!isBossPhase) {
                collectibleTimer--;
                if (collectibleTimer <= 0) {
                    collectibles.push(new Collectible());
                    collectibleTimer = 70 + Math.random() * 90;
                }
            }
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const c = collectibles[i];
                c.update();

                if (activePowerUps.magnet > 0) {
                    const dx = (dino.x + dino.w / 2) - (c.x + c.w / 2);
                    const dy = (dino.y + dino.h / 2) - (c.y + c.h / 2);
                    const dist = Math.hypot(dx, dy);
                    if (dist < MAGNET_RADIUS) {
                        c.x += dx * 0.18;
                        c.y += dy * 0.18;
                    }
                }

                c.draw();

                if (checkPickupCollision(dino, c)) {
                    score += c.value;
                    saveData.coins += c.value; // banked immediately -- spendable in the Shop right away
                    persistSave();
                    updateCoinDisplay();
                    spawnBurst(c.x + c.w / 2, c.y + c.h / 2, 10, c.isEgg ? '#ffb800' : '#ffe27a', { spread: 5, power: 4, life: 20 });
                    spawnFloatingText(c.x + c.w / 2, c.y, '+' + c.value, c.isEgg ? '#ffb800' : '#c9971f');
                    Sound.coin();
                    collectibles.splice(i, 1);
                    continue;
                }
                if (c.x + c.w < 0) collectibles.splice(i, 1);
            }

            // Power-ups: spawn & collect (also frozen during a Boss Phase)
            if (!isBossPhase) {
                powerUpTimer--;
                if (powerUpTimer <= 0) {
                    powerUps.push(new PowerUp());
                    powerUpTimer = 550 + Math.random() * 450;
                }
            }
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                p.update();
                p.draw();

                if (checkPickupCollision(dino, p)) {
                    activatePowerUp(p.type);
                    spawnBurst(p.x + p.w / 2, p.y + p.h / 2, 16, POWERUP_COLORS[p.type], { spread: 7, power: 5, life: 25 });
                    spawnFloatingText(p.x + p.w / 2, p.y, p.type === 'doubleJump' ? 'DOUBLE JUMP!' : p.type.toUpperCase() + '!', POWERUP_COLORS[p.type]);
                    Sound.powerup();
                    powerUps.splice(i, 1);
                    continue;
                }
                if (p.x + p.w < 0) powerUps.splice(i, 1);
            }

            // Boss Phase: giant Pterodactyl boss + fireball dodge sequence.
            // Safe to call every frame -- it's a no-op whenever `boss` is null
            // (i.e. outside of a boss encounter and after it's fully exited).
            updateAndDrawBoss();

            // FX
            updateAndDrawParticles();
            updateAndDrawFloatingTexts();

            // Dino
            dino.update();
            dino.draw();
        }

        /* =========================================================================
         * SHOP UI (skin unlocks & equipping)
         * ---------------------------------------------------------------------
         * The shop overlay is only reachable from the start/game-over screen
         * (it lives behind the '🛒 Shop' button on #overlay). While it's open,
         * gameplay inputs are suppressed -- see the shopOpen guard in the
         * keyboard/pointer handlers below.
         * ========================================================================= */
        let shopOpen = false;

        // Draws a small static preview of a skin into its own mini <canvas>,
        // reusing the same drawSkinFlairBack()/Front() helpers the live dino uses so the
        // shop preview always matches what you'll actually see in-game.
        function drawSkinPreview(canvasEl, skin) {
            const pctx = canvasEl.getContext('2d');
            const W = canvasEl.width, H = canvasEl.height;
            pctx.clearRect(0, 0, W, H);

            const sc = skin.colors
                ? { body: skin.colors.body, accent: skin.colors.accent, eye: skin.colors.eye, glow: skin.glow || null, alpha: skin.alpha ?? 1 }
                : { body: '#535353', accent: '#535353', eye: '#ffffff', glow: null, alpha: 1 };

            // Local coordinate space mirrors the real dino's proportions (40x44).
            // The dino's full silhouette actually spans roughly y=-18 (wizard hat
            // tip) to y=46 (feet) and x=0 to x=52 (snout), so the offset/canvas
            // size below (see renderShop's 60x72 canvas) is padded to fit that.
            const ox = 4, oy = 22;

            drawSkinFlairBack(pctx, skin, sc, ox, oy, 40, 44, false);

            pctx.globalAlpha = sc.alpha;
            pctx.fillStyle = sc.body;
            pctx.fillRect(ox, oy + 16, 10, 16);
            pctx.fillRect(ox + 6, oy + 12, 14, 20);
            pctx.fillRect(ox + 14, oy + 12, 16, 22);
            pctx.fillRect(ox + 22, oy, 18, 16);
            pctx.fillRect(ox + 40, oy + 2, 12, 10);
            pctx.fillRect(ox + 30, oy + 18, 8, 6);
            pctx.fillRect(ox + 10, oy + 34, 6, 10);
            pctx.fillRect(ox + 10, oy + 42, 8, 4);
            pctx.fillRect(ox + 22, oy + 34, 6, 6);

            pctx.globalAlpha = 1;
            pctx.fillStyle = sc.eye;
            pctx.fillRect(ox + 28, oy + 4, 4, 4);

            drawSkinFlairFront(pctx, skin, sc, ox, oy, 40, 44, false);
        }

        // Rebuilds the shop grid from SKINS + saveData -- called whenever coins,
        // unlocks, or the equipped skin change so the UI always stays in sync.
        function renderShop() {
            shopCoinDisplay.textContent = '🪙 ' + saveData.coins;
            shopGrid.innerHTML = '';

            SKINS.forEach(skin => {
                const owned = saveData.unlockedSkins.includes(skin.id);
                const equipped = saveData.equippedSkin === skin.id;

                const card = document.createElement('div');
                card.className = 'border-2 rounded p-2 flex flex-col items-center gap-1 text-center ' +
                    (equipped ? 'border-yellow-400' : 'border-gray-300 dark:border-gray-600');

                const prevCanvas = document.createElement('canvas');
                prevCanvas.width = 60;
                prevCanvas.height = 72;
                prevCanvas.className = 'mx-auto';
                prevCanvas.style.width = '48px';
                prevCanvas.style.height = '58px';
                drawSkinPreview(prevCanvas, skin);

                const name = document.createElement('div');
                name.className = 'text-[9px] md:text-[10px] mt-1';
                name.textContent = skin.name;

                const actionBtn = document.createElement('button');
                actionBtn.className = 'text-[8px] md:text-[9px] px-2 py-1 rounded border w-full mt-1 transition-colors';

                if (equipped) {
                    actionBtn.textContent = 'EQUIPPED';
                    actionBtn.disabled = true;
                    actionBtn.className += ' bg-yellow-400/20 border-yellow-400 text-yellow-600 dark:text-yellow-400 cursor-default';
                } else if (owned) {
                    actionBtn.textContent = 'EQUIP';
                    actionBtn.className += ' border-gray-400 dark:border-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700';
                    actionBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        saveData.equippedSkin = skin.id;
                        persistSave();
                        renderShop();
                    });
                } else {
                    const canAfford = saveData.coins >= skin.cost;
                    actionBtn.textContent = '🪙 ' + skin.cost;
                    actionBtn.className += canAfford
                        ? ' border-green-400 text-green-600 dark:text-green-400 hover:bg-green-100 dark:hover:bg-green-900/30'
                        : ' border-gray-300 dark:border-gray-600 text-gray-400 dark:text-gray-500 cursor-not-allowed';
                    if (!canAfford) actionBtn.disabled = true;
                    actionBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (saveData.coins < skin.cost) return;
                        saveData.coins -= skin.cost;
                        saveData.unlockedSkins.push(skin.id);
                        saveData.equippedSkin = skin.id; // auto-equip right after purchase
                        persistSave();
                        updateCoinDisplay();
                        Sound.unlockSkin();
                        renderShop();
                    });
                }

                card.appendChild(prevCanvas);
                card.appendChild(name);
                card.appendChild(actionBtn);
                shopGrid.appendChild(card);
            });
        }

        function openShop() {
            shopOpen = true;
            jumpHeld = false; // defensive: gameplay input is fully suspended while the shop
                              // is open, so make sure a held jump can't linger and fire the
                              // instant the shop closes back into an active run
            renderShop();
            shopOverlay.classList.remove('hidden');
        }

        function closeShop() {
            shopOpen = false;
            shopOverlay.classList.add('hidden');
        }

        /* =========================================================================
         * CONTROLS & EVENT LISTENERS
         * ---------------------------------------------------------------------
         * Three independent input channels drive the same jump/duck actions:
         *   1. KEYBOARD (desktop)          -- see "KEYBOARD CONTROLS" below
         *   2. MOUSE (desktop, tap-equivalent)
         *   3. TOUCH/SWIPE (mobile & tablet) -- see "TOUCH / SWIPE GESTURE
         *      SYSTEM" below
         * All three ultimately call handleJump()/handleDuck() or dino.jump()/
         * dino.duck() directly, so gameplay logic never needs to know which
         * device triggered it, and every channel independently respects the
         * `shopOpen` guard so the shop overlay always fully suppresses play.
         *
         * CONTINUOUS AUTO-JUMP (bunny-hop): layered on top of the three
         * channels above, every one of them also sets the single shared
         * `jumpHeld` latch true on press (keydown/mousedown/touchstart) and
         * false on release (keyup/mouseup/touchend/touchcancel). That latch
         * is polled -- not by any of the code below, but by dino.update()
         * itself -- at the exact instant the dino lands, so a jump input
         * still being held at landing re-fires immediately instead of
         * requiring a brand-new press. This is what makes holding the input
         * down produce continuous bunny-hopping. See the "CONTINUOUS
         * AUTO-JUMP INPUT LATCH" comment near the top of the state variables
         * for the full picture, and the ground-collision branch of
         * dino.update() for the Double Jump Protection guarantee.
         * ========================================================================= */

        function handleJump(e) {
            if (shopOpen) return; // shop swallows gameplay input while open
            Sound.unlock(); // resume/create the AudioContext on this user gesture
            if (e.type !== 'touchstart') e.preventDefault(); // prevent scrolling

            if (isGameOver) {
                initGame();
                isPlaying = true;
            } else if (!isPlaying) {
                initGame();
                isPlaying = true;
            } else {
                dino.jump();
            }
        }

        function handleDuck(e, isDucking) {
            if (shopOpen) return;
            if (isPlaying && !isGameOver) {
                dino.duck(isDucking);
            }
        }

        /* --- KEYBOARD CONTROLS ---------------------------------------------------
         * Zero-latency: dino.jump()/dino.duck() mutate game state synchronously
         * the instant `keydown` fires -- there's no queueing/debounce anywhere
         * in this chain, so the action registers on the exact frame the key is
         * pressed. We additionally ignore the browser's auto-repeat re-fires
         * of `keydown` (`e.repeat === true`) for the purposes of firing a
         * *second* discrete jump: only the initial press triggers
         * handleJump() directly, so holding a key doesn't spam redundant
         * jump attempts on its own. `preventDefault()` still runs on every
         * repeat though, so the page never scrolls or the spacebar never
         * "clicks" a focused button while the key is held down.
         *
         * Continuous Auto-Jump (bunny-hop): independent of that repeat
         * suppression, `jumpHeld` is latched true for as long as a jump key
         * is down (including through OS auto-repeat) and cleared on keyup.
         * dino.update() polls this latch on landing to re-jump automatically
         * -- see the CONTINUOUS AUTO-JUMP INPUT LATCH comment near the top of
         * the state variables, and the ground-collision branch of
         * dino.update() where it's consumed.
         * ------------------------------------------------------------------- */
        const JUMP_KEYS = new Set(['Space', 'ArrowUp', 'KeyW']);
        const DUCK_KEYS = new Set(['ArrowDown', 'KeyS']);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Escape' && shopOpen) {
                closeShop();
                return;
            }
            if (shopOpen) return; // ignore game inputs while the shop is open

            if (JUMP_KEYS.has(e.code)) {
                e.preventDefault(); // block spacebar/arrow page-scroll on every repeat
                jumpHeld = true; // latch held-state on every repeat too, so it stays
                                  // true for the entire physical duration of the press
                if (e.repeat) return; // ignore OS key-repeat -- jump already fired on first press
                handleJump(e);
            } else if (DUCK_KEYS.has(e.code)) {
                e.preventDefault();
                if (e.repeat) return; // ignore OS key-repeat -- already ducking
                handleDuck(e, true);
            }
        });

        window.addEventListener('keyup', (e) => {
            if (JUMP_KEYS.has(e.code)) {
                jumpHeld = false; // release the auto-jump latch
            } else if (DUCK_KEYS.has(e.code)) {
                handleDuck(e, false);
            }
        });

        /* --- MOUSE CONTROLS (desktop) -----------------------------------------
         * Continuous Auto-Jump: `jumpHeld` latches true on mousedown (the
         * mouse-button equivalent of a jump key going down) and is released
         * on `mouseup`. The `mouseup` listener is attached to `window` rather
         * than the canvas/overlay so a click-and-drag that releases the
         * button off the game surface still clears the latch cleanly --
         * otherwise a stray mouseup elsewhere on the page could leave the
         * dino auto-jumping forever.
         * ------------------------------------------------------------------- */
        function onJumpMouseDown(e) {
            jumpHeld = true;
            handleJump(e);
        }
        overlay.addEventListener('mousedown', onJumpMouseDown);
        canvas.addEventListener('mousedown', onJumpMouseDown); // tap directly on the canvas mid-run

        window.addEventListener('mouseup', () => {
            jumpHeld = false; // release the auto-jump latch
        });

        /* =========================================================================
         * TOUCH / SWIPE GESTURE SYSTEM (mobile & tablet)
         * ---------------------------------------------------------------------
         * One set of listeners on #game-container arbitrates every touch
         * gesture, so all mobile input logic lives in a single place:
         *
         *   - TAP              -> jump. Also starts/restarts a run from the
         *                          start/game-over screen for one-handed play.
         *   - SWIPE UP          -> instant jump, fired the moment vertical
         *                          travel crosses SWIPE_THRESHOLD px -- it
         *                          does not wait for touchend, so it feels
         *                          immediate rather than laggy.
         *   - SWIPE DOWN        -> instant duck, same instant-threshold logic.
         *   - TOUCH END/CANCEL  -> always un-ducks if a duck was in progress,
         *                          so the dino never gets stuck crouching.
         *
         * A gesture is classified by whichever axis (x or y) moved further,
         * so a mostly-horizontal drag can never be misread as a jump/duck.
         * A release counts as a TAP only if movement stayed under the swipe
         * threshold *and* the touch lasted under TAP_MAX_DURATION -- so a
         * slow, held-still press doesn't get misinterpreted as a swipe.
         *
         * GUARDRAILS: any touch that starts on a UI control (shop button,
         * mute button, shop close button) or lands anywhere while the shop
         * overlay is open is ignored entirely by this system. Those controls
         * also isolate themselves with their own stopPropagation() handlers
         * (see "UI GUARDRAILS" below), so a mis-tap has two independent
         * layers of defense before it could ever leak through into gameplay.
         * ========================================================================= */
        const SWIPE_THRESHOLD = 26;   // px of vertical travel that counts as a swipe (20-30px sweet spot)
        const TAP_MAX_DURATION = 250; // ms -- releases slower than this are never read as a "tap"

        let touchState = null; // { startX, startY, startTime, jumpFired, duckFired } | null while a touch is active

        // Elements that manage their own input and must never trigger gameplay,
        // even though they live inside #game-container.
        function isInteractiveTarget(target) {
            return !!target.closest('#shop-btn, #shop-overlay, #mute-btn, #shop-close-btn');
        }

        function onTouchStart(e) {
            if (shopOpen || isInteractiveTarget(e.target)) return;
            if (e.touches.length !== 1) return; // ignore pinch/multi-touch entirely

            Sound.unlock();
            const t = e.touches[0];
            touchState = { startX: t.clientX, startY: t.clientY, startTime: performance.now(), jumpFired: false, duckFired: false };

            // Nothing to swipe on the start/game-over screen -- any touch begins
            // a run immediately, same zero-latency feel as a mouse click.
            if (!isPlaying || isGameOver) {
                e.preventDefault();
                handleJump(e);
                touchState = null; // this gesture is spent; the new run starts standing
                return;
            }
            e.preventDefault(); // stop pull-to-refresh/page-scroll from hijacking the gesture

            /* Continuous Auto-Jump (touch/hold): latch `jumpHeld` the instant
             * a finger touches down during active gameplay, mirroring
             * keydown/mousedown. We don't yet know whether this touch will
             * resolve into a swipe-up jump, a swipe-down duck, or a plain
             * tap -- and that's fine, because dino.update() only ever
             * *consumes* this latch at the moment of landing, guarded there
             * so an in-progress duck always takes priority (see that guard
             * for why). So it's always safe to set it eagerly here, and
             * doing so is what lets a sustained press-and-hold keep the dino
             * bunny-hopping through however many landings happen while the
             * finger stays down -- the same "hold to keep jumping" feel as
             * holding Space or the mouse button down. */
            jumpHeld = true;
        }

        function onTouchMove(e) {
            if (!touchState || shopOpen) return;
            const t = e.touches[0];
            const dx = t.clientX - touchState.startX;
            const dy = t.clientY - touchState.startY;
            e.preventDefault();

            if (Math.abs(dy) <= Math.abs(dx)) return; // mostly horizontal -- not a jump/duck gesture

            if (!touchState.jumpFired && !touchState.duckFired && dy < -SWIPE_THRESHOLD) {
                touchState.jumpFired = true;
                dino.jump(); // Swipe Up -> instant jump
            } else if (!touchState.jumpFired && !touchState.duckFired && dy > SWIPE_THRESHOLD) {
                touchState.duckFired = true;
                dino.duck(true); // Swipe Down -> instant duck
            }
        }

        function onTouchEnd(e) {
            // Released unconditionally, ahead of the early-returns below, so
            // the Continuous Auto-Jump latch can never get stuck true --
            // matching the same "always reset on release" guarantee as
            // keyup/mouseup, regardless of what state the gesture itself
            // ended up in (tap, swipe, or interrupted by the shop opening).
            jumpHeld = false;

            if (!touchState || shopOpen) return;
            const elapsed = performance.now() - touchState.startTime;
            const wasTap = !touchState.jumpFired && !touchState.duckFired && elapsed <= TAP_MAX_DURATION;

            if (touchState.duckFired) dino.duck(false); // Release -> instantly stand back up
            if (wasTap && isPlaying && !isGameOver) dino.jump(); // Tap -> jump (casual one-handed play)

            touchState = null;
        }

        function onTouchCancel() {
            jumpHeld = false; // always release the auto-jump latch, same guarantee as onTouchEnd above
            if (touchState && touchState.duckFired) dino.duck(false); // don't get stuck ducking
            touchState = null;
        }

        gameContainer.addEventListener('touchstart', onTouchStart, { passive: false });
        gameContainer.addEventListener('touchmove', onTouchMove, { passive: false });
        gameContainer.addEventListener('touchend', onTouchEnd, { passive: false });
        gameContainer.addEventListener('touchcancel', onTouchCancel, { passive: false });

        /* --- UI GUARDRAILS ---------------------------------------------------
         * Every clickable control that sits on top of the game surface stops
         * its own mousedown/touchstart from bubbling up to the listeners
         * above, so opening the shop, closing it, or toggling mute can never
         * also be read as a jump/swipe by the gesture system -- and while the
         * shop overlay is open, the `shopOpen` checks throughout this file
         * strictly suppress every gameplay keyboard and touch input.
         * ------------------------------------------------------------------- */
        shopBtn.addEventListener('mousedown', (e) => e.stopPropagation());
        shopBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
        shopBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            Sound.unlock();
            openShop();
        });

        shopCloseBtn.addEventListener('mousedown', (e) => e.stopPropagation());
        shopCloseBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
        shopCloseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeShop();
        });

        // Clicking the dimmed backdrop (but not the panel itself) also closes the shop
        shopOverlay.addEventListener('mousedown', (e) => {
            if (e.target === shopOverlay) closeShop();
        });

        // Mute toggle -- persists across refreshes
        muteBtn.addEventListener('mousedown', (e) => e.stopPropagation());
        muteBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            Sound.unlock();
            saveData.muted = !saveData.muted;
            persistSave();
            updateMuteButton();
        });

        /* =========================================================================
         * INITIALIZATION
         * ========================================================================= */

        // Load persisted progress (high score, coins, skins, mute pref) before
        // the very first render so the HUD is correct from frame one.
        loadSave();
        highScore = saveData.highScore || 0;
        updateMuteButton();
        updateCoinDisplay();

        // Size the canvas for this device/orientation before the first paint
        fitCanvasToViewport();

        // Start Initial Render Loop
        updateTheme();
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        drawSky();
        drawGround();
        dino.draw();
        updateScoreDisplay(); // reflects the loaded high score immediately
        animate(); // Starts the loop, waiting for interaction

    </script>
</body>
</html>
