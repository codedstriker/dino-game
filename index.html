<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dino Run</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        html {
            height: 100%;
            overscroll-behavior-y: contain; /* Extra guard against Chrome/Android pull-to-refresh */
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #f7f7f7;
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
            overscroll-behavior-y: contain;
            -webkit-user-select: none;
            user-select: none;           /* No accidental text selection while swiping */
            -webkit-touch-callout: none;  /* No iOS long-press callout menu on the game surface */
            margin: 0;
            overflow: hidden;
        }

        /* =========================================================================
           FULL-PAGE VIEWPORT LAYOUT (UI/Layout Refactor)
           ---------------------------------------------------------------------
           #game-container used to be an in-flow, centered box capped at
           `max-w-3xl`, which left large unused margins on anything wider than
           a small tablet. It's now pinned to the full browser viewport with
           `position: fixed; inset: 0`, so it always occupies exactly
           100vw x 100vh (100dvh is used as the primary value so iOS/Android's
           collapsing/expanding browser chrome never clips or letterboxes the
           game incorrectly -- 100vh is kept as a fallback for browsers that
           don't support dvh yet). The title (<h1>) now lives *inside* this
           container as an absolutely-positioned HUD element instead of a
           separate block above it, so it no longer steals vertical space that
           should belong to the canvas -- see fitCanvasToViewport() in the
           script, which now fits against the *entire* viewport with only a
           small safe-area pad, not "viewport minus title chrome".
           ------------------------------------------------------------------- */
        #game-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* dynamic viewport height -- accounts for mobile browser chrome */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            image-rendering: pixelated;
            /* Deliberately left at the default touch-action ('auto') rather than
               'none' -- #shop-panel (a scrollable descendant, see below) needs to
               inherit permission to pan. touch-action is applied as the
               INTERSECTION of an element and all its ancestors, so locking this
               down here would also lock the shop's scroll list. Instead, only
               the actual play surface (#gameCanvas / #overlay, below) is locked. */
        }

        /* ---------------------------------------------------------------------
           RESPONSIVE VIEWPORT SCALING (see fitCanvasToViewport() in the script)
           -----------------------------------------------------------------------
           The canvas's internal drawing resolution never changes -- only its
           CSS box does. `max-width:100%` is just a pre-JS safety net; the real
           sizing happens every load/resize/orientation-change in JS, which is
           more reliable than pure CSS across iOS Safari's dynamic toolbar,
           Android split-screen, and orientation changes. `image-rendering:
           pixelated` is what keeps the pixel-art crisp (nearest-neighbor)
           instead of blurry (bilinear) no matter how large the CSS box scales
           relative to the fixed 800x250 internal resolution.
           ------------------------------------------------------------------- */
        canvas {
            display: block;
            margin: 0 auto;
            background-color: transparent;
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* Safe-area aware HUD padding -- keeps the title/score/badges clear of
           notches, camera cutouts, and rounded corners on full-screen mobile
           devices, while degrading gracefully to a plain 1rem pad on desktop
           browsers/older devices that don't support env(). */
        #hud-title {
            top: max(0.75rem, env(safe-area-inset-top));
        }
        #powerup-bar {
            top: max(1rem, env(safe-area-inset-top));
            left: max(1rem, env(safe-area-inset-left));
        }
        #hud-score-bar {
            top: max(1rem, env(safe-area-inset-top));
            right: max(1rem, env(safe-area-inset-right));
        }

        #gameCanvas, #overlay {
            touch-action: none;          /* No native scroll/zoom/pull-to-refresh once a gesture starts on the play surface */
            -webkit-touch-callout: none;
        }

        /* Dark mode support (page chrome only -- the game canvas has its own
           independent day/night cycle driven by score, see JS below) */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #202124;
                color: #bdc1c6;
            }
        }

        /* --- Power-up status badges (top-left HUD) --- */
        .powerup-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(128, 128, 128, 0.12);
            border: 1px solid currentColor;
            border-radius: 4px;
            padding: 4px 6px 5px 6px;
            font-size: 10px;
            position: relative;
            overflow: hidden;
        }
        .powerup-badge .badge-icon {
            font-size: 12px;
            line-height: 1;
        }
        .powerup-badge .badge-time {
            font-size: 9px;
            min-width: 14px;
        }
        .powerup-badge .badge-track {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 2px;
            background: rgba(128, 128, 128, 0.3);
        }
        .powerup-badge .badge-fill {
            height: 100%;
            width: 100%;
            background: currentColor;
        }
    </style>
</head>

                🛒 Shop
            </button>
        </div>

        <!-- Shop Overlay -->
        <div id="shop-overlay" class="absolute inset-0 z-30 hidden flex items-center justify-center bg-black/70 p-4">
            <div id="shop-panel" class="bg-white dark:bg-gray-900 border-2 border-gray-400 dark:border-gray-600 rounded-lg p-4 md:p-5 max-w-sm w-full max-h-[92%] overflow-y-auto text-gray-700 dark:text-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs md:text-sm">🛒 SKIN SHOP</h2>
                    <div id="shop-coin-display" class="text-[10px] md:text-xs text-yellow-600 dark:text-yellow-400">🪙 0</div>
                </div>
                <div id="shop-grid" class="grid grid-cols-2 gap-3"></div>

                    Close
                </button>
            </div>
        </div>

        <!-- The Canvas -->
        <canvas id="gameCanvas" width="800" height="250" class="mx-auto max-w-full"></canvas>
    </div>

        function fitCanvasToViewport() {
            const aspectRatio = CANVAS_WIDTH / CANVAS_HEIGHT;
            const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const SAFE_PAD = 12;
            const availableWidth = Math.max(160, viewportWidth - SAFE_PAD * 2);
            const availableHeight = Math.max(120, viewportHeight - SAFE_PAD * 2);

            let targetWidth = availableWidth;
            let targetHeight = targetWidth / aspectRatio;
            if (targetHeight > availableHeight) {
                targetHeight = availableHeight;
                targetWidth = targetHeight * aspectRatio;
            }

            canvas.style.width = Math.floor(targetWidth) + 'px';
            canvas.style.height = Math.floor(targetHeight) + 'px';
        }

        window.addEventListener('orientationchange', fitCanvasToViewport);

        /* =========================================================================
         * SAVE SYSTEM & AUDIO & UTILS
         * ========================================================================= */
        const SAVE_KEY = 'dinoRunSaveV1';
        let saveData = { highScore: 0, coins: 0, unlockedSkins: ['classic'], equippedSkin: 'classic', muted: false };

        function loadSave() {
            try {
                const raw = localStorage.getItem(SAVE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    saveData = Object.assign({}, saveData, parsed);
                    if (!Array.isArray(saveData.unlockedSkins) || !saveData.unlockedSkins.includes('classic')) {
                        saveData.unlockedSkins = Array.isArray(saveData.unlockedSkins) ? saveData.unlockedSkins : [];
                        saveData.unlockedSkins.push('classic');
                    }
                    if (!SKINS.find(s => s.id === saveData.equippedSkin)) saveData.equippedSkin = 'classic';
                }
            } catch (err) {}
        }
        function persistSave() {
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); } catch (err) {}
        }
        function updateCoinDisplay() { coinTotalElement.textContent = '🪙 ' + saveData.coins; }
        function updateMuteButton() { muteBtn.textContent = saveData.muted ? '🔇' : '🔊'; }

        const Sound = (() => {
            let audioCtx = null;
            function ensureContext() {
                if (!audioCtx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) audioCtx = new AC();
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }
            function tone(freq, duration, { type = 'square', volume = 0.15, slideTo = null, delay = 0 } = {}) {
                if (saveData.muted) return;
                const ac = ensureContext();
                if (!ac) return;
                const t0 = ac.currentTime + delay;
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t0);
                if (slideTo !== null) osc.frequency.linearRampToValueAtTime(slideTo, t0 + duration);
                gain.gain.setValueAtTime(volume, t0);
                gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
                osc.connect(gain).connect(ac.destination);
                osc.start(t0);
                osc.stop(t0 + duration + 0.02);
            }
            function noise(duration, { volume = 0.12, delay = 0 } = {}) {
                if (saveData.muted) return;
                const ac = ensureContext();
                if (!ac) return;
                const t0 = ac.currentTime + delay;
                const bufferSize = Math.max(1, Math.floor(ac.sampleRate * duration));
                const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                const src = ac.createBufferSource();
                src.buffer = buffer;
                const gain = ac.createGain();
                gain.gain.setValueAtTime(volume, t0);
                gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
                src.connect(gain).connect(ac.destination);
                src.start(t0);
            }
            return {
                unlock() { ensureContext(); },
                jump() { tone(340, 0.12, { type: 'square', volume: 0.14, slideTo: 640 }); },
                doubleJump() {

        function initGame() {

        function resetSpawnTimers() { collectibleTimer = 60 + Math.random() * 60; powerUpTimer = 500 + Math.random() * 400; }

        function updatePowerUpUI() {

                    el.classList.remove('hidden'); el.querySelector('.badge-fill').style.width = Math.max(0, (activePowerUps[type] / DURATION_FRAMES[type]) * 100) + '%'; el.querySelector('.badge-time').textContent = Math.ceil(activePowerUps[type] / 60) + 's';
                } else { el.classList.add('hidden'); }

        }
        function activatePowerUp(type) { activePowerUps[type] = DURATION_FRAMES[type]; }
        function updatePowerUpTimers() { POWERUP_TYPES.forEach(type => { if (activePowerUps[type] > 0) activePowerUps[type]--; }); updatePowerUpUI(); }

        function drawSky() {
            const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT); grad.addColorStop(0, theme.skyTop); grad.addColorStop(1, theme.skyBottom);
            ctx.fillStyle = grad; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        function drawCelestialBody() {

            const x = 40 + t * (CANVAS_WIDTH - 80), y = 30 + (1 - Math.sin(t * Math.PI)) * 40;

        function checkObstacleCollision(r1, r2) { const pX = 8, pY = 6; return (r1.x + pX < r2.x + r2.w - pX && r1.x + r1.w - pX > r2.x + pX && r1.y + pY < r2.y + r2.h - pY && r1.y + r1.h - pY > r2.y + pY); }

        function drawBossUI() {

                const rFrames = Math.max(0, BOSS_PHASE_DURATION_FRAMES - bossSurvivalFrames), rSecs = Math.ceil(rFrames / 60), pct = rFrames / BOSS_PHASE_DURATION_FRAMES;

                ctx.font = '10px "Press Start 2P", monospace'; ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)'; ctx.strokeText(rSecs + 's', CANVAS_WIDTH / 2, bY + bH + 16); ctx.fillStyle = '#000000'; ctx.fillText(rSecs + 's', CANVAS_WIDTH / 2, bY + bH + 16);
            } else {
                ctx.font = '9px "Press Start 2P", monospace'; ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)'; ctx.strokeText('INCOMING...', CANVAS_WIDTH / 2, 50); ctx.fillStyle = '#000000'; ctx.fillText('INCOMING...', CANVAS_WIDTH / 2, 50);

        function updateAndDrawBoss() {
            if (!boss) return; boss.update(); boss.draw();
            if (isBossPhase && bossPhaseState === 'active') {
                bossSurvivalFrames++; bossFireballTimer--;
                if (bossFireballTimer <= 0) { spawnFireballWave(); bossFireballTimer = FIREBALL_MIN_INTERVAL + Math.random() * FIREBALL_MAX_INTERVAL; }
                if (bossSurvivalFrames >= BOSS_PHASE_DURATION_FRAMES) endBossSurvival();

            for (let i = fireballs.length - 1; i >= 0; i--) {
                const fb = fireballs[i]; fb.update(); fb.draw();

            if (bossExiting && boss.x > CANVAS_WIDTH) { boss = null; bossExiting = false; bossPhaseState = null; }
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            ctx.setTransform(1, 0, 0, 1, 0, 0); updateTheme();
            if (!isPlaying && !isGameOver) { ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); drawSky(); drawGround(); dino.draw(); return; }
            if (isGameOver) {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); applyShake(); drawSky(); drawGround(); clouds.forEach(c => c.draw()); obstacles.forEach(o => o.draw()); collectibles.forEach(c => c.draw()); powerUps.forEach(p => p.draw());
                if (boss) boss.draw(); fireballs.forEach(fb => fb.draw()); if (isBossPhase) drawBossUI(); updateAndDrawParticles(); updateAndDrawFloatingTexts(); dino.draw(); return;
            }

            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); applyShake(); frames++;
            if (frames % 10 === 0) score += 0.5;
            if (frames % 500 === 0 && gameSpeed < MAX_SPEED) gameSpeed += 0.5;
            updateScoreDisplay(); updatePowerUpTimers();
            if (!isBossPhase && score >= nextBossThreshold) { nextBossThreshold += 500; triggerBossPhase(); }

            drawSky(); drawGround();
            if (frames % 120 === 0 && Math.random() > 0.3) clouds.push(new Cloud());
            for (let i = clouds.length - 1; i >= 0; i--) { clouds[i].update(); clouds[i].draw(); if (clouds[i].x + clouds[i].w < 0) clouds.splice(i, 1); }

            if (!isBossPhase) {
                if (frames % Math.floor(Math.max(50, 120 - (gameSpeed * 3))) === 0 && Math.random() > 0.2) obstacles.push(new Obstacle(Math.random() < 0.3 && score > 300 ? 2 : (Math.random() < 0.5 ? 0 : 1)));
            }
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i]; obs.update(); obs.draw();
                if (checkObstacleCollision(dino, obs)) {
                    if (activePowerUps.shield > 0) { spawnBurst(obs.x + obs.w / 2, obs.y + obs.h / 2, 14, POWERUP_COLORS.shield, { spread: 8, power: 5, life: 25 }); triggerShake(4, 8); obstacles.splice(i, 1); continue; }
                    else { gameOver(); }
                }
                if (obs.x + obs.w < 0) obstacles.splice(i, 1);
            }

            if (!isBossPhase) {
                collectibleTimer--; if (collectibleTimer <= 0) { collectibles.push(new Collectible()); collectibleTimer = 70 + Math.random() * 90; }
            }
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const c = collectibles[i]; c.update();
                if (activePowerUps.magnet > 0) { const dx = (dino.x + dino.w / 2) - (c.x + c.w / 2), dy = (dino.y + dino.h / 2) - (c.y + c.h / 2); if (Math.hypot(dx, dy) < MAGNET_RADIUS) { c.x += dx * 0.18; c.y += dy * 0.18; } }
                c.draw();
                if (checkPickupCollision(dino, c)) {
                    score += c.value; saveData.coins += c.value; persistSave(); updateCoinDisplay();
                    spawnBurst(c.x + c.w / 2, c.y + c.h / 2, 10, c.isEgg ? '#ffb800' : '#ffe27a', { spread: 5, power: 4, life: 20 });
                    spawnFloatingText(c.x + c.w / 2, c.y, '+' + c.value, c.isEgg ? '#ffb800' : '#c9971f');
                    Sound.coin(); collectibles.splice(i, 1); continue;
                }
                if (c.x + c.w < 0) collectibles.splice(i, 1);
            }

            if (!isBossPhase) { powerUpTimer--; if (powerUpTimer <= 0) { powerUps.push(new PowerUp()); powerUpTimer = 550 + Math.random() * 450; } }
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i]; p.update(); p.draw();
                if (checkPickupCollision(dino, p)) { activatePowerUp(p.type); spawnBurst(p.x + p.w / 2, p.y + p.h / 2, 16, POWERUP_COLORS[p.type], { spread: 7, power: 5, life: 25 }); spawnFloatingText(p.x + p.w / 2, p.y, p.type === 'doubleJump' ? 'DOUBLE JUMP!' : p.type.toUpperCase() + '!', POWERUP_COLORS[p.type]); Sound.powerup(); powerUps.splice(i, 1); continue; }
                if (p.x + p.w < 0) powerUps.splice(i, 1);
            }

            updateAndDrawBoss(); updateAndDrawParticles(); updateAndDrawFloatingTexts(); dino.update(); dino.draw();
        }

        /* =========================================================================
         * SHOP UI & INPUT CONTROLS
         * ========================================================================= */
        let shopOpen = false;

        function drawSkinPreview(canvasEl, skin) {
            const pctx = canvasEl.getContext('2d'), W = canvasEl.width, H = canvasEl.height; pctx.clearRect(0, 0, W, H);
            const sc = skin.colors ? { body: skin.colors.body, accent: skin.colors.accent, eye: skin.colors.eye, glow: skin.glow || null, alpha: skin.alpha ?? 1 } : { body: '#535353', accent: '#535353', eye: '#ffffff', glow: null, alpha: 1 };
            const ox = 4, oy = 22;
            drawSkinFlairBack(pctx, skin, sc, ox, oy, 40, 44, false);
            pctx.globalAlpha = sc.alpha; pctx.fillStyle = sc.body;
            pctx.fillRect(ox, oy + 16, 10, 16); pctx.fillRect(ox + 6, oy + 12, 14, 20); pctx.fillRect(ox + 14, oy + 12, 16, 22); pctx.fillRect(ox + 22, oy, 18, 16); pctx.fillRect(ox + 40, oy + 2, 12, 10); pctx.fillRect(ox + 30, oy + 18, 8, 6); pctx.fillRect(ox + 10, oy + 34, 6, 10); pctx.fillRect(ox + 10, oy + 42, 8, 4); pctx.fillRect(ox + 22, oy + 34, 6, 6);
            pctx.globalAlpha = 1; pctx.fillStyle = sc.eye; pctx.fillRect(ox + 28, oy + 4, 4, 4);
            drawSkinFlairFront(pctx, skin, sc, ox, oy, 40, 44, false);
        }

        function renderShop() {
            shopCoinDisplay.textContent = '🪙 ' + saveData.coins; shopGrid.innerHTML = '';
            SKINS.forEach(skin => {
                const owned = saveData.unlockedSkins.includes(skin.id), equipped = saveData.equippedSkin === skin.id;
                const card = document.createElement('div'); card.className = 'border-2 rounded p-2 flex flex-col items-center gap-1 text-center ' + (equipped ? 'border-yellow-400' : 'border-gray-300 dark:border-gray-600');
                const prevCanvas = document.createElement('canvas'); prevCanvas.width = 60; prevCanvas.height = 72; prevCanvas.className = 'mx-auto'; prevCanvas.style.width = '48px'; prevCanvas.style.height = '58px'; drawSkinPreview(prevCanvas, skin);
                const name = document.createElement('div'); name.className = 'text-[9px] md:text-[10px] mt-1'; name.textContent = skin.name;
                const actionBtn = document.createElement('button'); actionBtn.className = 'text-[8px] md:text-[9px] px-2 py-1 rounded border w-full mt-1 transition-colors';
                if (equipped) { actionBtn.textContent = 'EQUIPPED'; actionBtn.disabled = true; actionBtn.className += ' bg-yellow-400/20 border-yellow-400 text-yellow-600 dark:text-yellow-400 cursor-default'; }
                else if (owned) { actionBtn.textContent = 'EQUIP'; actionBtn.className += ' border-gray-400 dark:border-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700'; actionBtn.addEventListener('click', (e) => { e.stopPropagation(); saveData.equippedSkin = skin.id; persistSave(); renderShop(); }); }
                else {
                    const canAfford = saveData.coins >= skin.cost; actionBtn.textContent = '🪙 ' + skin.cost;
                    actionBtn.className += canAfford ? ' border-green-400 text-green-600 dark:text-green-400 hover:bg-green-100 dark:hover:bg-green-900/30' : ' border-gray-300 dark:border-gray-600 text-gray-400 dark:text-gray-500 cursor-not-allowed';
                    if (!canAfford) actionBtn.disabled = true;
                    actionBtn.addEventListener('click', (e) => { e.stopPropagation(); if (saveData.coins < skin.cost) return; saveData.coins -= skin.cost; saveData.unlockedSkins.push(skin.id); saveData.equippedSkin = skin.id; persistSave(); updateCoinDisplay(); Sound.unlockSkin(); renderShop(); });
                }
                card.appendChild(prevCanvas); card.appendChild(name); card.appendChild(actionBtn); shopGrid.appendChild(card);
            });
        }
        function openShop() { shopOpen = true; jumpHeld = false; renderShop(); shopOverlay.classList.remove('hidden'); }
        function closeShop() { shopOpen = false; shopOverlay.classList.add('hidden'); }

        function handleJump(e) {
            if (shopOpen) return; Sound.unlock(); if (e.type !== 'touchstart') e.preventDefault();
            if (isGameOver || !isPlaying) { initGame(); isPlaying = true; } else { dino.jump(); }
        }
        function handleDuck(e, isDucking) { if (shopOpen) return; if (isPlaying && !isGameOver) dino.duck(isDucking); }

        const JUMP_KEYS = new Set(['Space', 'ArrowUp', 'KeyW']), DUCK_KEYS = new Set(['ArrowDown', 'KeyS']);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Escape' && shopOpen) { closeShop(); return; } if (shopOpen) return;
            if (JUMP_KEYS.has(e.code)) { e.preventDefault(); jumpHeld = true; if (e.repeat) return; handleJump(e); }
            else if (DUCK_KEYS.has(e.code)) { e.preventDefault(); if (e.repeat) return; handleDuck(e, true); }
        });
        window.addEventListener('keyup', (e) => { if (JUMP_KEYS.has(e.code)) jumpHeld = false; else if (DUCK_KEYS.has(e.code)) handleDuck(e, false); });

        function onJumpMouseDown(e) { jumpHeld = true; handleJump(e); }
        overlay.addEventListener('mousedown', onJumpMouseDown); canvas.addEventListener('mousedown', onJumpMouseDown);
        window.addEventListener('mouseup', () => { jumpHeld = false; });

        const SWIPE_THRESHOLD = 26, TAP_MAX_DURATION = 250; let touchState = null;
        function isInteractiveTarget(target) { return !!target.closest('#shop-btn, #shop-overlay, #mute-btn, #shop-close-btn'); }
        function onTouchStart(e) {
            if (shopOpen || isInteractiveTarget(e.target) || e.touches.length !== 1) return; Sound.unlock();
            const t = e.touches[0]; touchState = { startX: t.clientX, startY: t.clientY, startTime: performance.now(), jumpFired: false, duckFired: false };
            if (!isPlaying || isGameOver) { e.preventDefault(); handleJump(e); touchState = null; return; }
            e.preventDefault(); jumpHeld = true;
        }
        function onTouchMove(e) {
            if (!touchState || shopOpen) return; const t = e.touches[0], dx = t.clientX - touchState.startX, dy = t.clientY - touchState.startY; e.preventDefault();
            if (Math.abs(dy) <= Math.abs(dx)) return;
            if (!touchState.jumpFired && !touchState.duckFired && dy < -SWIPE_THRESHOLD) { touchState.jumpFired = true; dino.jump(); }
            else if (!touchState.jumpFired && !touchState.duckFired && dy > SWIPE_THRESHOLD) { touchState.duckFired = true; dino.duck(true); }
        }
        function onTouchEnd(e) {
            jumpHeld = false; if (!touchState || shopOpen) return; const elapsed = performance.now() - touchState.startTime, wasTap = !touchState.jumpFired && !touchState.duckFired && elapsed <= TAP_MAX_DURATION;
            if (touchState.duckFired) dino.duck(false); if (wasTap && isPlaying && !isGameOver) dino.jump(); touchState = null;
        }
        function onTouchCancel() { jumpHeld = false; if (touchState && touchState.duckFired) dino.duck(false); touchState = null; }
        gameContainer.addEventListener('touchstart', onTouchStart, { passive: false }); gameContainer.addEventListener('touchmove', onTouchMove, { passive: false }); gameContainer.addEventListener('touchend', onTouchEnd, { passive: false }); gameContainer.addEventListener('touchcancel', onTouchCancel, { passive: false });

        shopBtn.addEventListener('mousedown', (e) => e.stopPropagation()); shopBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true }); shopBtn.addEventListener('click', (e) => { e.stopPropagation(); Sound.unlock(); openShop(); });
        shopCloseBtn.addEventListener('mousedown', (e) => e.stopPropagation()); shopCloseBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true }); shopCloseBtn.addEventListener('click', (e) => { e.stopPropagation(); closeShop(); });
        shopOverlay.addEventListener('mousedown', (e) => { if (e.target === shopOverlay) closeShop(); });
        muteBtn.addEventListener('mousedown', (e) => e.stopPropagation()); muteBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true }); muteBtn.addEventListener('click', (e) => { e.stopPropagation(); Sound.unlock(); saveData.muted = !saveData.muted; persistSave(); updateMuteButton(); });

        loadSave(); highScore = saveData.highScore || 0; updateMuteButton(); updateCoinDisplay();
        fitCanvasToViewport(); updateTheme(); ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); drawSky(); drawGround(); dino.draw(); updateScoreDisplay(); animate();

    </script>
</body>
</html>
